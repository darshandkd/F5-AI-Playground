                    <div className="flex flex-col gap-4">
                        <div className={`p-4 rounded-xl flex-shrink-0 ${isDark ? 'bg-white/5' : 'bg-gray-50'}`}>
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-sm font-medium">Prompt Length</span>
                                <span className="text-sm font-mono font-bold text-f5-red">{promptLen.toLocaleString()} tokens</span>
                            </div>
                            <input type="range" min="128" max="128000" value={promptLen} onChange={e => setPromptLen(Number(e.target.value))} className="w-full range-visible" />
                        </div>

                        <div className={`flex-1 rounded-xl p-6 ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <div className="text-xs uppercase font-bold tracking-wider text-gray-500 mb-3">Inference Timeline</div>
                            <div className={`h-16 rounded-xl overflow-hidden flex ${isDark ? 'bg-black/30' : 'bg-gray-100'}`}>
                                <motion.div animate={{ width: `${prefillPct}%` }} transition={{ type: 'spring', stiffness: 100, damping: 20 }}
                                    className={`h-full flex items-center justify-center relative ${kvCacheHit ? (isDark ? 'bg-gradient-to-r from-cyan-500/20 to-blue-500/20' : 'bg-gradient-to-r from-cyan-500/15 to-blue-500/15') : 'bg-gradient-to-r from-red-500/30 to-orange-500/30'}`}>
                                    <div className="text-center">
                                        <div className={`text-sm font-bold ${kvCacheHit ? 'text-f5-cyan' : 'text-f5-red'}`}>PREFILL{kvCacheHit ? ' (cached)' : ''}</div>
                                        <div className={`text-xs font-mono ${kvCacheHit ? 'text-f5-cyan/70' : 'text-f5-red/70'}`}>
                                            {kvCacheHit
                                                ? `${Math.round(promptLen * 0.75).toLocaleString()} of ${promptLen.toLocaleString()} tokens cached · ${Math.round(promptLen * 0.25).toLocaleString()} to process`
                                                : `Processing all ${promptLen.toLocaleString()} tokens · ${modelSize}B model`}
                                        </div>
                                    </div>
                                    <div className={`absolute right-0 top-0 bottom-0 w-1 ${kvCacheHit ? 'bg-f5-cyan' : 'bg-f5-orange'}`}></div>
                                </motion.div>
                                <div className="flex-1 h-full flex items-center justify-center bg-green-500/10">
                                    <div className="text-center">
                                        <div className="text-sm font-bold text-green-500">DECODE</div>
                                        <div className="text-xs font-mono text-green-500/70">~{(30 * modelSize / 7).toFixed(0)}ms per token</div>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center justify-center mt-2 gap-1">
                                <i className="ph ph-arrow-fat-up text-f5-orange"></i>
                                <span className="text-sm font-bold text-f5-orange">First token appears here — nothing outputs during prefill</span>
                            </div>

                            <div className="grid grid-cols-3 gap-3 mt-5">
                                <div>
                                    <div className="text-xs font-medium text-gray-500 mb-1.5">Model</div>
                                    <div className="flex flex-wrap gap-1">
                                        {[{ s: 7, l: '7B' }, { s: 13, l: '13B' }, { s: 70, l: '70B' }, { s: 405, l: '405B' }].map(m => (
                                            <button key={m.s} onClick={() => setModelSize(m.s)}
                                                className={`px-2.5 py-1.5 rounded-lg text-xs font-mono ${modelSize === m.s ? 'bg-f5-red text-white' : (isDark ? 'bg-white/5 text-gray-400' : 'bg-gray-100 text-gray-500')}`}>
                                                {m.l}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <div className="text-xs font-medium text-gray-500 mb-1.5">GPUs</div>
                                    <div className="flex gap-1">
                                        {[1, 2, 4, 8].map(g => (
                                            <button key={g} onClick={() => setGpuCount(g)}
                                                className={`px-2.5 py-1.5 rounded-lg text-xs font-mono ${gpuCount === g ? 'bg-f5-cyan text-white' : (isDark ? 'bg-white/5 text-gray-400' : 'bg-gray-100 text-gray-500')}`}>
                                                {g}x A100
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <div className="text-xs font-medium text-gray-500 mb-1.5">KV Cache</div>
                                    <div className={`flex items-center gap-2 p-1.5 rounded-lg ${isDark ? 'bg-black/20' : 'bg-gray-50'}`}>
                                        <div className={`toggle-track ${kvCacheHit ? 'active' : ''}`} onClick={() => setKvCacheHit(!kvCacheHit)} role="switch">
                                            <div className="toggle-thumb" />

                                        <span className="text-xs font-medium">Cached</span>
                                    </div>
                                </div>
                            </div>

                            <div className="flex items-center gap-6 mt-5">
                                <div className="flex-shrink-0">
                                    <div className="text-xs uppercase tracking-wider text-gray-500 mb-1">TTFT</div>
                                    <div className="text-4xl font-mono font-bold" style={{ color: ttftColor }}>
                                        {ttft > 1000 ? `${(ttft / 1000).toFixed(1)}s` : `${Math.round(ttft)}ms`}

                                    {kvCacheHit && <div className="text-xs text-green-500 font-medium mt-0.5"><i className="ph ph-lightning mr-1"></i>75% faster</div>}
                                </div>
                                <div className="flex-1">
                                    <div className={`h-4 rounded-full relative overflow-hidden ${isDark ? 'bg-white/10' : 'bg-gray-200'}`}
                                        style={{ background: 'linear-gradient(to right, #10b981 0%, #10b981 6%, #ff6a13 6%, #ff6a13 10%, #ef4444 10%, #ef4444 40%, #7f1d1d 100%)' }}>

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // Sub-tab 3: Batching — the unfairness problem
            const BatchTab = () => {
                const [reqBLen, setReqBLen] = useState(32000);
                const [running, setRunning] = useState(false);
                const [progress, setProgress] = useState(0);
                const [chunked, setChunked] = useState(false);
                const runRef = React.useRef(null);

                const reqAPrefill = 60;
                const reqBPrefill = (reqBLen / 1000) * 120;
                const blockTime = reqBPrefill - reqAPrefill;
                const totalDuration = Math.max(reqBPrefill, 1000);
                const reqAPrefillPct = Math.max((reqAPrefill / totalDuration) * 100, 2);
                const reqBPrefillPct = (reqBPrefill / totalDuration) * 100;
                const blockedPct = (blockTime / totalDuration) * 100;

                const handleRun = () => {
                    if (runRef.current) clearInterval(runRef.current);
                    setRunning(true);
                    setProgress(0);
                    const startTime = Date.now();
                    const animDuration = Math.min(Math.max(reqBPrefill / 500, 2), 8) * 1000;

                    runRef.current = setInterval(() => {
                        const elapsed = Date.now() - startTime;
                        const pct = Math.min(elapsed / animDuration, 1);
                        setProgress(pct);
                        if (pct >= 1) {
                            clearInterval(runRef.current);
                            setRunning(false);
                        }
                    }, 30);
                };

                React.useEffect(() => {
                    return () => { if (runRef.current) clearInterval(runRef.current); };
                }, []);

                const stripeBg = isDark
                    ? 'repeating-linear-gradient(90deg, rgba(255,106,19,0.2) 0px, rgba(255,106,19,0.2) 20px, transparent 20px, transparent 26px)'
                    : 'repeating-linear-gradient(90deg, rgba(255,106,19,0.15) 0px, rgba(255,106,19,0.15) 20px, transparent 20px, transparent 26px)';

                return (
                    <div className="flex flex-col gap-4">
                        <div className={`p-4 rounded-xl flex flex-wrap items-center gap-4 flex-shrink-0 ${isDark ? 'bg-white/5' : 'bg-gray-50'}`}>
                            <div className="flex-1 min-w-[200px]">
                                <div className="flex items-center justify-between mb-2">
                                    <span className="text-sm font-medium">Request B prompt length</span>
                                    <span className="text-sm font-mono font-bold text-f5-red">{reqBLen.toLocaleString()} tokens</span>
                                </div>
                                <input type="range" min="4000" max="128000" value={reqBLen}
                                    onChange={e => { setReqBLen(Number(e.target.value)); setProgress(0); }}
                                    className="w-full range-visible" disabled={running} />
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex items-center gap-2">
                                    <div className={`toggle-track ${chunked ? 'active' : ''}`} onClick={() => { setChunked(!chunked); setProgress(0); }} role="switch">
                                        <div className="toggle-thumb" />
                                    </div>
                                    <span className="text-xs font-medium">Chunked Prefill</span>
                                </div>
                                <button onClick={handleRun} disabled={running}
                                    className={`px-5 py-2 rounded-lg text-sm font-bold flex-shrink-0 ${running ? 'bg-gray-500/20 text-gray-500' : 'bg-f5-red text-white hover:bg-f5-red/90'}`}>
                                    <i className={`ph ${running ? 'ph-circle-notch animate-spin' : 'ph-play'} mr-1`}></i>
                                    {running ? 'Running...' : 'Run'}
                                </button>
                            </div>
                        </div>

                        <div className={`flex-1 rounded-xl p-6 ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <div className="mb-2 flex items-center gap-2">
                                <span className="text-sm font-bold text-f5-cyan w-28 flex-shrink-0">Request A</span>
                                <span className={`text-xs ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>"What's 2+2?" — 500 tokens</span>
                            </div>
                            <div className={`h-16 rounded-xl overflow-hidden flex mb-5 ${isDark ? 'bg-black/30' : 'bg-gray-100'}`}>
                                <div className="h-full flex items-center justify-center bg-f5-cyan/20" style={{ width: `${reqAPrefillPct}%`, minWidth: 40 }}>
                                    <span className="text-xs font-mono text-f5-cyan">{reqAPrefill}ms</span>
                                </div>
                                {!chunked ? (
                                    <React.Fragment>
                                        <motion.div animate={{ width: progress > 0.05 ? `${Math.min(blockedPct * progress, blockedPct)}%` : '0%' }}
                                            className="h-full flex items-center justify-center bg-red-500/20 overflow-hidden" transition={{ duration: 0.1 }}>
                                            {progress > 0.15 && (
                                                <div className="text-center px-2">
                                                    <div className="text-sm font-bold text-red-500 animate-pulse">BLOCKED</div>
                                                    <div className="text-xs font-mono text-red-400">waiting {(blockTime / 1000).toFixed(1)}s</div>
                                                </div>
                                            )}
                                        </motion.div>
                                        {progress >= 0.95 && (
                                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                                                className="flex-1 h-full flex items-center justify-center bg-green-500/10">
                                                <span className="text-xs font-mono text-green-500">Decode</span>
                                            </motion.div>
                                        )}
                                    </React.Fragment>
                                ) : (
                                    <div className="flex-1 h-full flex items-center justify-center bg-green-500/10">
                                        <span className="text-sm font-mono text-green-500">Decode starts in ~200ms</span>
                                    </div>
                                )}
                            </div>

                            <div className="mb-2 flex items-center gap-2">
                                <span className="text-sm font-bold text-f5-orange w-28 flex-shrink-0">Request B</span>
                                <span className={`text-xs ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>"Summarize this novel" — {reqBLen.toLocaleString()} tokens</span>
                            </div>
                            <div className={`h-16 rounded-xl overflow-hidden flex mb-5 ${isDark ? 'bg-black/30' : 'bg-gray-100'}`}>
                                <motion.div animate={{ width: `${Math.min(progress * 100, reqBPrefillPct)}%` }}
                                    className="h-full flex items-center justify-center bg-orange-500/20"
                                    style={chunked ? { background: stripeBg } : {}} transition={{ duration: 0.1 }}>
                                    <span className="text-sm font-mono text-f5-orange">Prefill {(reqBPrefill / 1000).toFixed(1)}s</span>
                                </motion.div>
                                {progress >= reqBPrefillPct / 100 && (
                                    <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                                        className="flex-1 h-full flex items-center justify-center bg-green-500/10">
                                        <span className="text-xs font-mono text-green-500">Decode</span>
                                    </motion.div>
                                )}
                            </div>

                            <div className={`p-4 rounded-xl text-sm leading-relaxed ${isDark ? 'bg-black/20 text-gray-400' : 'bg-gray-50 text-gray-600'}`}>
                                {!chunked ? (
                                    <React.Fragment>
                                        <strong className="text-red-500">Without chunked prefill:</strong> Request A finishes its own prefill in {reqAPrefill}ms but must wait {(blockTime / 1000).toFixed(1)}s for B's prefill to complete. A waits <strong>{Math.round(blockTime / reqAPrefill)}x</strong> longer than its own processing time — classic head-of-line blocking.
                                    </React.Fragment>
                                ) : (
                                    <React.Fragment>
                                        <strong className="text-green-500">With chunked prefill (vLLM):</strong> B's prefill is split into chunks. A's decode runs in the gaps between chunks. A gets its first token in ~200ms instead of waiting {(blockTime / 1000).toFixed(1)}s. Both requests make progress concurrently.
                                    </React.Fragment>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            // Sub-tab 4: Fix It — mitigations
            const FixTab = () => {
                const [activeDemo, setActiveDemo] = useState(null);

                const mitigations = [
                    {
                        title: 'Chunked Prefill',
                        icon: 'ph-scissors',
                        color: '#e4002b',
                        stat: 'Reduces HOL blocking by up to 90% for short requests in mixed batches',
                        before: { label: 'Standard', desc: 'Solid prefill blocks all other requests until complete', pct: 100, color: 'bg-red-500/40' },

                    },
                    {
                        title: 'Prompt Caching (KV Cache)',

                        color: '#00b4d8',
                        stat: 'Cuts TTFT 50-80% for repeated system prompts (Anthropic + OpenAI offer this)',
                        before: { label: 'No cache', desc: '10K system prompt + 2K user query = 12K tokens to process', pct: 100, color: 'bg-orange-500/40' },
                        after: { label: 'Cached', desc: 'System prompt cached — only 2K tokens need prefill', pct: 20, color: 'bg-f5-cyan/40' },
                    },
                    {
                        title: 'Speculative Decoding',
                        icon: 'ph-fast-forward',
                        color: '#10b981',
                        stat: '1.5-3x faster decode throughput without quality loss',
                        before: { label: 'Standard', desc: 'Large model generates one token at a time (serial)', pct: 100, color: 'bg-orange-500/40' },
                        after: { label: 'Speculative', desc: 'Small draft model predicts 4-5 ahead, large model verifies in parallel', pct: 35, color: 'bg-green-500/40' },
                    },
                ];

                const stripeAfterBg = isDark
                    ? 'repeating-linear-gradient(90deg, rgba(228,0,43,0.2) 0px, rgba(228,0,43,0.2) 16px, transparent 16px, transparent 22px)'
                    : 'repeating-linear-gradient(90deg, rgba(228,0,43,0.15) 0px, rgba(228,0,43,0.15) 16px, transparent 16px, transparent 22px)';

                return (
                    <div className="flex flex-col gap-4">
                        {mitigations.map((m, i) => (
                            <div key={i} className={`p-6 rounded-xl cursor-pointer transition-all ${isDark ? 'bg-white/5 border border-white/10 hover:border-white/20' : 'bg-white border border-gray-200 hover:border-gray-300'}`}
                                onClick={() => setActiveDemo(activeDemo === i ? null : i)}>
                                <div className="flex items-center gap-3 mb-2">
                                    <i className={`ph ${m.icon} text-xl`} style={{ color: m.color }}></i>
                                    <h4 className="text-base font-bold flex-1">{m.title}</h4>
                                    <i className={`ph ph-caret-${activeDemo === i ? 'up' : 'down'} text-gray-500`}></i>
                                </div>
                                <p className={`text-sm ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>{m.stat}</p>

                                <AnimatePresence>
                                    {activeDemo === i && (
                                        <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }}
                                            className="overflow-hidden">
                                            <div className={`grid grid-cols-2 gap-4 pt-4 mt-3 border-t ${isDark ? 'border-white/10' : 'border-gray-200'}`}>
                                                <div>
                                                    <div className="text-xs uppercase font-bold text-red-500 mb-2">Before</div>
                                                    <div className={`h-12 rounded-lg overflow-hidden mb-2 ${isDark ? 'bg-black/30' : 'bg-gray-100'}`}>
                                                        <div className={`h-full ${m.before.color} flex items-center justify-center`} style={{ width: `${m.before.pct}%` }}>
                                                            <span className="text-xs font-mono font-bold">{m.before.label}</span>
                                                        </div>
                                                    </div>
                                                    <p className={`text-xs ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>{m.before.desc}</p>
                                                </div>
                                                <div>
                                                    <div className="text-xs uppercase font-bold text-green-500 mb-2">After</div>
                                                    <div className={`h-12 rounded-lg overflow-hidden mb-2 ${isDark ? 'bg-black/30' : 'bg-gray-100'}`}>
                                                        <motion.div initial={{ width: `${m.before.pct}%` }} animate={{ width: `${m.after.pct}%` }}
                                                            transition={{ duration: 0.8, ease: 'easeOut' }}
                                                            className={`h-full ${m.after.color} flex items-center justify-center`}
                                                            style={m.after.striped ? { background: stripeAfterBg } : {}}>
                                                            <span className="text-xs font-mono font-bold">{m.after.label}</span>
                                                        </motion.div>

                                                    <p className={`text-xs ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>{m.after.desc}</p>
                                                </div>
                                            </div>
                                        </motion.div>
                                    )}
                                </AnimatePresence>
                            </div>
                        ))}
                    </div>

            const tabs = [
                { id: 'wait', label: 'The Wait', icon: 'ph-hourglass', help: 'Experience the delay before the first token. Long prompts cause noticeable TTFT latency.' },
                { id: 'why', label: 'Why It Happens', icon: 'ph-chart-bar-horizontal', help: 'The prefill phase processes all input tokens before generating output. Longer inputs mean longer waits.' },
                { id: 'batch', label: 'Batching', icon: 'ph-rows', help: 'Multiple requests share GPU compute. Large prefills can block shorter requests (head-of-line blocking).' },
                { id: 'fix', label: 'Fix It', icon: 'ph-wrench', help: 'Mitigations include chunked prefill, priority queues, and speculative decoding to reduce TTFT.' },
            ];

            return (
                <div className="flex flex-col h-full">
                    <div className={`flex gap-1 p-1 rounded-xl mb-4 flex-shrink-0 ${isDark ? 'bg-white/5' : 'bg-gray-100'}`}>
                        {tabs.map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)}
                                className={`flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors ${
                                    activeTab === t.id
                                        ? (isDark ? 'bg-white/10 text-white' : 'bg-white text-gray-900 shadow-sm')
                                        : (isDark ? 'text-gray-500 hover:text-gray-300' : 'text-gray-500 hover:text-gray-700')
                                }`}>
                                <i className={`ph ${t.icon} text-sm`}></i>
                                {t.label}
                                {t.help && <HelpTooltip text={t.help} />}
                            </button>
                        ))}
                    </div>

                    <div className="flex-1 min-h-0 overflow-auto">
                        <AnimatePresence mode="wait">
                            <motion.div key={activeTab} initial={{ opacity: 0, y: 8 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }}
                                transition={{ duration: 0.2 }}>
                                {activeTab === 'wait' && <WaitTab />}
                                {activeTab === 'why' && <WhyTab />}
                                {activeTab === 'batch' && <BatchTab />}
                                {activeTab === 'fix' && <FixTab />}

                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mt-10 flex-shrink-0">
                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-gray-50 border border-gray-200'}`}>
                            <div className="text-sm font-bold mb-2">The Restaurant Analogy</div>
                            <div className="flex items-center gap-2 mb-2 text-lg">
                                <span>📋</span><span className={isDark ? 'text-gray-600' : 'text-gray-500'}>→</span>
                                <span>🍳</span><span className={isDark ? 'text-gray-600' : 'text-gray-500'}>→</span>
                                <span>🍽️</span>
                            </div>
                            <p className={`text-xs leading-relaxed ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>
                                Read entire order → Cook → First plate out. Nothing leaves the kitchen until the chef reads the whole 50-item catering order.
                            </p>
                        </div>
                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-gray-50 border border-gray-200'}`}>
                            <div className="text-sm font-bold mb-2">UX Thresholds</div>
                            <div className="h-4 rounded-full overflow-hidden"
                                style={{ background: 'linear-gradient(to right, #10b981 0%, #10b981 15%, #ff6a13 15%, #ff6a13 25%, #ef4444 25%, #ef4444 60%, #7f1d1d 100%)' }}></div>
                            <div className="flex justify-between mt-1.5">
                                <span className="text-xs text-green-500">Code &lt;300ms</span>
                                <span className="text-xs text-orange-500">Voice &lt;500ms</span>
                                <span className="text-xs text-red-500">Chat &lt;2s</span>
                                <span className="text-xs text-red-800">Broken &gt;2s</span>
                            </div>
                        </div>
                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-gray-50 border border-gray-200'}`}>
                            <div className="text-sm font-bold mb-2">Prefill vs Decode</div>
                            <p className={`text-xs leading-relaxed ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>
                                For a 100K-token prompt on a 70B model, the user waits <strong className="text-red-500">12+ seconds</strong> before seeing anything — then tokens stream at 30ms each.
                            </p>
                            <p className={`text-xs mt-1 font-medium ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>
                                The first token costs 1000x more time than every subsequent token.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        // ---- ATTENTION & KV CACHE (progressive 4-tab) ----
        const AttentionKVCache = () => {
            const { isDark } = useTheme();
            const [activeTab, setActiveTab] = useState('mask');
            const [modelPreset, setModelPreset] = useState('70b');
            const [useGQA, setUseGQA] = useState(true);
            const [seqLen, setSeqLen] = useState(4096);

            const modelSpecs = {
                '7b': { name: 'Llama 3 7B', layers: 32, qHeads: 32, kvGQA: 8, dHead: 128, wGB: 7 },
                '70b': { name: 'Llama 3 70B', layers: 80, qHeads: 64, kvGQA: 8, dHead: 128, wGB: 25 },
                '405b': { name: 'Llama 3 405B', layers: 126, qHeads: 128, kvGQA: 8, dHead: 128, wGB: 50 },
            };
            const spec = modelSpecs[modelPreset];
            const kvHeads = useGQA ? spec.kvGQA : spec.qHeads;
            const a100 = 80;
            const kvPerTok = (2 * kvHeads * spec.dHead * 2 * spec.layers) / 1024;
            const totalKVGB = (seqLen * kvPerTok) / 1024 / 1024;

            // Sub-tab 1: The Mask
            const MaskTab = () => {
                const [inputText, setInputText] = useState('');
                const [isCausal, setIsCausal] = useState(true);
                const [hoveredRow, setHoveredRow] = useState(null);
                const rawWords = inputText.trim().split(/\s+/).filter(Boolean).slice(0, 8);
                const wordPad = ['...', '▸', '▹'];
                const words = rawWords.length >= 3 ? rawWords : rawWords.length > 0 ? [...rawWords, ...wordPad.slice(0, 3 - rawWords.length)] : [];

                const getRowWeights = (row) => {
                    const maxCol = isCausal ? row : words.length - 1;
                    const raws = words.map((_, col) => {
                        if (col > maxCol) return 0;
                        const selfBoost = col === row ? 0.35 : 0;
                        const nearBoost = Math.abs(row - col) <= 1 ? 0.15 : 0;
                        return 0.1 + selfBoost + nearBoost + (((row * 7 + col * 13) % 10) / 60);
                    });
                    const sum = raws.reduce((a, b) => a + b, 0);
                    return raws.map(r => sum > 0 ? r / sum : 0);
                };

                return (
                    <div className="flex flex-col gap-4">
                        <div className={`p-6 rounded-2xl flex-shrink-0 ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <div className="relative">
                                <textarea value={inputText} onChange={e => setInputText(e.target.value)}
                                    maxLength={40}
                                    placeholder="Type a prompt... e.g. 'The future of AI is'"
                                    className={`w-full h-24 p-4 rounded-xl font-mono text-sm resize-none border focus:outline-none focus:border-f5-red transition-colors ${
                                        isDark ? 'bg-surface-900 border-white/10 text-white placeholder-gray-600' : 'bg-gray-50 border-gray-200 text-gray-900 placeholder-gray-400'
                                    }`} />
                                <span className={`absolute bottom-2 right-3 text-[10px] font-mono ${inputText.length >= 40 ? 'text-f5-red font-bold' : (isDark ? 'text-gray-600' : 'text-gray-500')}`}>{inputText.length}/40</span>
                            </div>
                            <div className="flex items-center gap-3 mt-3">
                                <button onClick={() => setIsCausal(true)}
                                    className={`px-4 py-2.5 rounded-full text-sm font-bold transition-colors ${isCausal ? 'bg-f5-red text-white' : (isDark ? 'bg-white/5 text-gray-400 hover:bg-white/10' : 'bg-gray-100 text-gray-500 hover:bg-gray-200')}`}>
                                    Causal (GPT)
                                </button>
                                <button onClick={() => setIsCausal(false)}
                                    className={`px-4 py-2.5 rounded-full text-sm font-bold transition-colors ${!isCausal ? 'bg-f5-cyan text-white' : (isDark ? 'bg-white/5 text-gray-400 hover:bg-white/10' : 'bg-gray-100 text-gray-500 hover:bg-gray-200')}`}>
                                    Bidirectional (BERT)
                                </button>
                            </div>
                        </div>

                        <div className={`rounded-xl p-6 ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            {words.length > 0 && (
                                <div className="flex justify-center overflow-x-auto">
                                    <div>
                                        <div className="flex mb-1">
                                            <div className="w-16"></div>
                                            {words.map((t, i) => (
                                                <div key={i} className={`w-14 text-center text-xs font-mono truncate ${hoveredRow !== null && (isCausal ? i <= hoveredRow : true) ? (isDark ? 'text-purple-400 font-bold' : 'text-purple-600 font-bold') : 'text-gray-500'}`}>{t}</div>
                                            ))}
                                        </div>
                                        {words.map((rowT, row) => {
                                            const weights = getRowWeights(row);
                                            return (
                                                <div key={row} className="flex"
                                                    onMouseEnter={() => setHoveredRow(row)} onMouseLeave={() => setHoveredRow(null)}>
                                                    <div className={`w-16 text-right pr-2 text-xs font-mono flex items-center justify-end ${hoveredRow === row ? 'text-f5-red font-bold' : 'text-gray-500'}`}>{rowT}</div>
                                                    {words.map((_, col) => {
                                                        const canAttend = isCausal ? col <= row : true;
                                                        const w = weights[col];
                                                        const isActive = hoveredRow === row && canAttend;
                                                        const intensity = canAttend ? Math.max(0.08, w * 2.2) : 0;
                                                        const bgColor = isActive
                                                            ? `rgba(228,0,43,${intensity})`
                                                            : canAttend
                                                                ? (isDark ? `rgba(168,85,247,${intensity})` : `rgba(109,40,217,${intensity})`)
                                                                : 'transparent';
                                                        return (
                                                            <div key={col}
                                                                className={`w-14 h-14 flex items-center justify-center text-xs font-mono border transition-all cursor-pointer ${
                                                                    canAttend
                                                                        ? (isDark ? 'border-white/5' : 'border-gray-200')
                                                                        : (isDark ? 'bg-black/20 border-white/5' : 'bg-gray-50 border-gray-200')
                                                                }`}
                                                                style={canAttend ? { backgroundColor: bgColor } : {}}>
                                                                {canAttend && isActive && <span className="text-white font-bold drop-shadow-sm">{(w * 100).toFixed(0)}%</span>}
                                                                {canAttend && !isActive && <span className={isDark ? 'text-white/60' : (intensity > 0.35 ? 'text-white/90' : 'text-gray-700')} style={!isDark && intensity > 0.35 ? { textShadow: '0 1px 2px rgba(0,0,0,0.2)' } : {}}>{(w * 100).toFixed(0)}</span>}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {hoveredRow !== null && (
                                <div className={`mt-4 p-3 rounded-lg text-sm ${isDark ? 'bg-black/20 text-gray-300' : 'bg-gray-50 text-gray-600'}`}>
                                    <strong className="text-f5-red">{words[hoveredRow]}</strong> attends to:{' '}
                                    {getRowWeights(hoveredRow).map((w, i) => w > 0 ? (
                                        <span key={i} className="inline-block mr-2">
                                            <span className="font-mono">{words[i]}</span>
                                            <span className="text-xs text-gray-500 ml-0.5">({(w * 100).toFixed(0)}%)</span>
                                        </span>
                                    ) : null)}
                                </div>
                            )}

                            <div className={`mt-3 p-3 rounded-lg text-sm ${isDark ? 'bg-black/10 text-gray-400' : 'bg-gray-50 text-gray-500'}`}>
                                {isCausal
                                    ? <React.Fragment><strong className="text-f5-red">Causal:</strong> Token {words.length} sees tokens 1-{words.length}. Each token can only look backward — this is how GPT generates text left-to-right.</React.Fragment>
                                    : <React.Fragment><strong className="text-f5-cyan">Bidirectional:</strong> Every token sees every other token. Great for understanding (BERT), but can't generate text — it would see the future.</React.Fragment>
                                }
                            </div>
                        </div>
                    </div>
                );
            };

            // Sub-tab 2: QKV Mechanics
            const QKVTab = () => {
                const [step, setStep] = useState(1);
                const [focusIdx, setFocusIdx] = useState(3);
                const words = ['The', 'quick', 'brown', 'fox'];
                const allWeights = [
                    [1.0, 0, 0, 0],
                    [0.35, 0.65, 0, 0],
                    [0.15, 0.30, 0.55, 0],
                    [0.12, 0.25, 0.41, 0.22],
                ];
                const weights = allWeights[focusIdx];

                return (
                    <div className="flex flex-col gap-4">
                        <div className={`flex flex-wrap items-center gap-3 p-4 rounded-xl flex-shrink-0 ${isDark ? 'bg-white/5' : 'bg-gray-50'}`}>
                            <span className="text-sm font-medium flex-shrink-0">Examining token:</span>
                            <div className="flex gap-2">
                                {words.map((w, i) => (
                                    <button key={i} onClick={() => { setFocusIdx(i); setStep(1); }}
                                        className={`px-3 py-1.5 rounded-lg text-sm font-mono font-medium ${focusIdx === i ? 'bg-f5-red text-white' : (isDark ? 'bg-white/5 text-gray-400' : 'bg-white text-gray-500')}`}>
                                        {w}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className={`rounded-xl p-6 ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <AnimatePresence mode="wait">
                                <motion.div key={step} initial={{ opacity: 0, y: 8 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }} transition={{ duration: 0.2 }}>
                                    {step === 1 && (
                                        <div>
                                            <div className="text-xs uppercase font-bold tracking-wider text-gray-500 mb-3">Step 1: Create Q, K, V Vectors</div>
                                            <p className={`text-sm mb-4 ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>
                                                Each token's embedding is multiplied by three learned weight matrices to produce Query, Key, and Value vectors.
                                            </p>
                                            <div className={`p-5 rounded-xl ${isDark ? 'bg-black/20' : 'bg-gray-50'}`}>
                                                <div className="flex items-center justify-center gap-3 mb-4">
                                                    <div className={`px-4 py-3 rounded-lg text-sm font-mono font-bold ${isDark ? 'bg-white/10' : 'bg-white border border-gray-200'}`}>
                                                        "{words[focusIdx]}" embedding
                                                    </div>
                                                    <i className="ph ph-arrow-right text-gray-500"></i>
                                                    <div className="flex gap-2">
                                                        {[
                                                            { letter: 'Q', color: '#e4002b', label: 'Query' },
                                                            { letter: 'K', color: '#ff6a13', label: 'Key' },
                                                            { letter: 'V', color: '#00b4d8', label: 'Value' },
                                                        ].map(v => (
                                                            <div key={v.letter} className={`px-4 py-3 rounded-lg text-center ${isDark ? 'bg-white/5' : 'bg-white border border-gray-200'}`}>
                                                                <div className="text-2xl font-bold font-mono" style={{ color: v.color }}>{v.letter}</div>
                                                                <div className="text-xs text-gray-500">{v.label}</div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className={`text-sm text-center ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>
                                                    <strong className="text-f5-red">Q</strong> = "What am I looking for?" &nbsp;
                                                    <strong className="text-f5-orange">K</strong> = "What do I contain?" &nbsp;
                                                    <strong className="text-f5-cyan">V</strong> = "What info do I carry?"
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {step === 2 && (
                                        <div>
                                            <div className="text-xs uppercase font-bold tracking-wider text-gray-500 mb-3">Step 2: Compare Q Against All Visible Keys</div>
                                            <p className={`text-sm mb-4 ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>
                                                The Query of "{words[focusIdx]}" is dot-producted with every visible Key. Softmax normalizes the scores into attention weights.
                                            </p>
                                            <div className="space-y-2">
                                                {words.slice(0, focusIdx + 1).map((w, i) => (
                                                    <div key={i} className="flex items-center gap-3">
                                                        <div className="w-32 text-sm font-mono text-right">
                                                            <span className="text-f5-red">Q</span>_{words[focusIdx]} · <span className="text-f5-orange">K</span>_{w}
                                                        </div>
                                                        <div className="text-sm font-mono w-12 text-right font-bold" style={{ color: weights[i] > 0.3 ? '#e4002b' : isDark ? '#9ca3af' : '#6b7280' }}>
                                                            {weights[i].toFixed(2)}
                                                        </div>
                                                        <div className={`flex-1 h-8 rounded-lg overflow-hidden ${isDark ? 'bg-black/30' : 'bg-gray-100'}`}>
                                                            <motion.div initial={{ width: 0 }} animate={{ width: `${weights[i] * 100}%` }}
                                                                transition={{ duration: 0.6, delay: i * 0.15 }}
                                                                className="h-full rounded-lg flex items-center justify-end pr-2"
                                                                style={{ backgroundColor: `rgba(228,0,43,${0.2 + weights[i] * 0.6})` }}>
                                                                <span className="text-xs font-bold text-white">{(weights[i] * 100).toFixed(0)}%</span>
                                                            </motion.div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className={`mt-3 text-xs text-center ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>
                                                Scores sum to 1.0 after softmax normalization
                                            </div>
                                        </div>
                                    )}

                                    {step === 3 && (
                                        <div>
                                            <div className="text-xs uppercase font-bold tracking-wider text-gray-500 mb-3">Step 3: Weighted Sum of Values</div>
                                            <p className={`text-sm mb-4 ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>
                                                Attention weights multiply each token's Value vector. The weighted sum becomes "{words[focusIdx]}"'s enriched output.
                                            </p>
                                            <div className={`p-5 rounded-xl ${isDark ? 'bg-black/20' : 'bg-gray-50'}`}>
                                                <div className="flex flex-wrap items-center justify-center gap-2 mb-3 text-sm font-mono">
                                                    {words.slice(0, focusIdx + 1).map((w, i) => (
                                                        <React.Fragment key={i}>
                                                            {i > 0 && <span className="text-gray-500">+</span>}
                                                            <span>
                                                                <span className="font-bold" style={{ color: weights[i] > 0.3 ? '#e4002b' : '#6b7280' }}>{weights[i].toFixed(2)}</span>
                                                                <span className="text-gray-500"> · </span>
                                                                <span className="text-f5-cyan">V</span>_{w}
                                                            </span>
                                                        </React.Fragment>
                                                    ))}
                                                </div>
                                                <div className="flex items-center justify-center gap-2">
                                                    <i className="ph ph-equals text-gray-500"></i>
                                                    <div className={`px-4 py-2 rounded-lg text-sm font-mono font-bold ${isDark ? 'bg-f5-green/20 text-f5-green' : 'bg-green-50 text-green-700'}`}>
                                                        output_{words[focusIdx]}
                                                    </div>
                                                </div>
                                                <p className={`text-sm mt-4 text-center ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>
                                                    "{words[focusIdx]}" now carries context from {focusIdx > 0 ? 'its neighbors' : 'itself'} — {focusIdx >= 2 ? `especially "${words[focusIdx - 1]}" (${(weights[focusIdx - 1] * 100).toFixed(0)}%)` : 'weighted by relevance'}.
                                                </p>
                                            </div>
                                        </div>
                                    )}
                                </motion.div>
                            </AnimatePresence>

                            <div className="flex items-center justify-between mt-5 pt-4 border-t" style={{ borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)' }}>
                                <button onClick={() => setStep(Math.max(1, step - 1))} disabled={step === 1}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium ${step === 1 ? 'text-gray-500 cursor-not-allowed' : (isDark ? 'bg-white/5 text-white hover:bg-white/10' : 'bg-gray-100 text-gray-700 hover:bg-gray-200')}`}>
                                    <i className="ph ph-caret-left mr-1"></i>Prev
                                </button>
                                <span className="text-sm font-medium text-gray-500">Step {step} of 3</span>
                                <button onClick={() => setStep(Math.min(3, step + 1))} disabled={step === 3}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium ${step === 3 ? 'text-gray-500 cursor-not-allowed' : 'bg-f5-red text-white hover:bg-f5-red/90'}`}>
                                    Next<i className="ph ph-caret-right ml-1"></i>
                                </button>
                            </div>
                        </div>

                        <div className={`p-4 rounded-xl text-sm ${isDark ? 'bg-f5-cyan/5 border border-f5-cyan/20 text-gray-300' : 'bg-blue-50 border border-blue-100 text-gray-600'}`}>
                            <i className="ph ph-lightbulb text-f5-cyan mr-1"></i>
                            <strong>Analogy:</strong> You're at a conference (<span className="text-f5-red font-bold">Q</span> = your question). You scan name badges (<span className="text-f5-orange font-bold">K</span> = expertise). Based on match, you listen to answers (<span className="text-f5-cyan font-bold">V</span> = knowledge).
                        </div>
                    </div>
                );
            };

            // Sub-tab 3: KV Cache
            const KVTab = () => {
                const [bitWidth, setBitWidth] = useState(16);
                const bitOptions = [
                    { bits: 16, label: 'FP16', desc: 'No compression', color: '#6b7280' },
                    { bits: 8, label: '8-bit', desc: 'Standard quant', color: '#00b4d8' },
                    { bits: 4, label: '4-bit', desc: 'Aggressive quant', color: '#10b981' },
                    { bits: 3, label: '3-bit', desc: 'TurboQuant', color: '#e4002b' },
                ];
                const compressionRatio = 16 / bitWidth;
                const compressedKVPerTok = kvPerTok / compressionRatio;
                const compressedTotalGB = totalKVGB / compressionRatio;
                const baselineUsed = spec.wGB + totalKVGB;
                const compressedUsed = spec.wGB + compressedTotalGB;
                const isBaseOOM = baselineUsed > a100;
                const isCompOOM = compressedUsed > a100;
                const freedGB = totalKVGB - compressedTotalGB;
                const maxConcurrent = Math.max(1, Math.floor((a100 - spec.wGB) / (compressedTotalGB > 0 ? compressedTotalGB : 0.01)));
                const baseMaxConcurrent = Math.max(1, Math.floor((a100 - spec.wGB) / (totalKVGB > 0 ? totalKVGB : 0.01)));
                const speedBoost = bitWidth === 3 ? '~8x' : bitWidth === 4 ? '~6x' : bitWidth === 8 ? '~2x' : '1x';

                return (
                    <div className="space-y-4">
                        {/* Intro */}
                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <p className={`text-sm leading-relaxed ${isDark ? 'text-gray-300' : 'text-gray-600'}`}>
                                The KV Cache stores <strong className={isDark ? 'text-white' : 'text-gray-900'}>Key and Value vectors for every token at every layer</strong>. It avoids recomputation during generation — but memory grows fast. Compression (quantization) can shrink it dramatically with near-zero accuracy loss.
                            </p>
                        </div>

                        {/* Controls row */}
                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <div className="flex flex-wrap items-end gap-4">
                                <div>
                                    <div className={`text-[9px] uppercase font-bold tracking-wider mb-1.5 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>Model</div>
                                    <div className="flex gap-1.5">
                                        {Object.entries(modelSpecs).map(([k, m]) => (
                                            <button key={k} onClick={() => setModelPreset(k)}
                                                className={`px-3 py-2 rounded-lg text-xs font-medium ${modelPreset === k ? 'bg-f5-red text-white' : (isDark ? 'bg-white/5 text-gray-400' : 'bg-gray-100 text-gray-500')}`}>
                                                {m.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex-1 min-w-[140px]">
                                    <div className="flex items-center justify-between mb-1.5">
                                        <span className={`text-[9px] uppercase font-bold tracking-wider ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>Context Length</span>
                                        <span className="text-xs font-mono font-bold text-f5-red">{seqLen.toLocaleString()}</span>
                                    </div>
                                    <input type="range" min="512" max="128000" value={seqLen} onChange={e => setSeqLen(Number(e.target.value))} className="w-full range-visible" />
                                </div>
                                <div>
                                    <div className={`text-[9px] uppercase font-bold tracking-wider mb-1.5 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>GQA</div>
                                    <div className="flex items-center gap-2">
                                        <div className={`toggle-track ${useGQA ? 'active' : ''}`} onClick={() => setUseGQA(!useGQA)} role="switch">
                                            <div className="toggle-thumb" />
                                        </div>
                                        <span className={`text-xs font-medium ${isDark ? 'text-gray-300' : 'text-gray-600'}`}>{useGQA ? `${spec.kvGQA} KV heads` : `${spec.qHeads} heads`}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Compression selector */}
                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <div className={`text-[9px] uppercase font-bold tracking-wider mb-2 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>KV Cache Quantization</div>
                            <div className="grid grid-cols-4 gap-2">
                                {bitOptions.map(opt => (
                                    <button key={opt.bits} onClick={() => setBitWidth(opt.bits)}
                                        className={`p-3 rounded-xl text-center transition-all border-2 ${
                                            bitWidth === opt.bits
                                                ? (isDark ? 'bg-black/30' : 'bg-white shadow-md')
                                                : (isDark ? 'bg-white/[0.02] border-transparent hover:border-white/10' : 'bg-gray-50 border-transparent hover:border-gray-200')
                                        }`}
                                        style={{ borderColor: bitWidth === opt.bits ? opt.color : undefined }}>
                                        <div className="text-lg font-bold font-mono" style={{ color: bitWidth === opt.bits ? opt.color : (isDark ? '#9ca3af' : '#6b7280') }}>{opt.label}</div>
                                        <div className={`text-[10px] ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>{opt.desc}</div>

            // ── Tab: Scale ──

                return (

                    <div className="flex-1 min-h-0 overflow-auto">

                                transition={{ duration: 0.2 }}>

            );
        };

        // ============================================================
        // CONTEXT ENGINEERING — Interactive Context Explainer
        // ============================================================
        const ContextEngineering = () => {
            const { isDark } = useTheme();
            const [activeTab, setActiveTab] = useState('what');

            // ── Tab 1: What is Context? ──
            const WhatTab = () => {
                const [step, setStep] = useState(0);
                const pieces = [
                    { label: 'System Instructions', desc: 'Rules the AI follows — its personality, boundaries, and role.', tokens: 500, color: '#e4002b', icon: 'ph-gear' },
                    { label: 'Conversation History', desc: 'Everything said so far — your messages and the AI\'s replies.', tokens: 2400, color: '#ff6a13', icon: 'ph-clock-counter-clockwise' },
                    { label: 'Your Message', desc: 'The question or instruction you just typed.', tokens: 50, color: '#00b4d8', icon: 'ph-user' },
                    { label: 'Tool Results', desc: 'Data the AI fetched — search results, file contents, API responses.', tokens: 3200, color: '#10b981', icon: 'ph-wrench' },
                    { label: 'Retrieved Documents', desc: 'Relevant docs pulled from a knowledge base to help answer your question.', tokens: 8000, color: '#a855f7', icon: 'ph-files' },
                ];

                useEffect(() => {
                    if (step < pieces.length) {
                        const t = setTimeout(() => setStep(s => s + 1), 700);
                        return () => clearTimeout(t);
                    }
                }, [step]);

                const totalTokens = pieces.slice(0, step).reduce((s, p) => s + p.tokens, 0);
                const capacity = 32000;

                return (
                    <div className="space-y-4">
                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <p className={`text-sm leading-relaxed ${isDark ? 'text-gray-300' : 'text-gray-600'}`}>
                                Think of context as <strong className={isDark ? 'text-white' : 'text-gray-900'}>everything on the AI's desk</strong> while it writes a response. It's not just your message — it's every piece of information the model can see at that moment.
                            </p>
                        </div>

                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <div className="flex items-center justify-between mb-2">
                                <span className={`text-xs font-bold uppercase ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>Context Used</span>
                                <span className="text-xs font-mono"><AnimatedCounter value={totalTokens} className={isDark ? 'text-white' : 'text-gray-900'} /> <span className={isDark ? 'text-gray-500' : 'text-gray-500'}>/ {capacity.toLocaleString()} tokens</span></span>
                            </div>
                            <div className={`w-full h-3 rounded-full overflow-hidden ${isDark ? 'bg-white/5' : 'bg-gray-100'}`}>
                                <motion.div className="h-full rounded-full" style={{ background: 'linear-gradient(90deg, #e4002b, #ff6a13)' }}
                                    animate={{ width: `${Math.min((totalTokens / capacity) * 100, 100)}%` }}
                                    transition={{ duration: 0.5, ease: 'easeOut' }} />
                            </div>
                        </div>

                        <div className="space-y-2">
                            {pieces.map((p, i) => (
                                <AnimatePresence key={p.label}>
                                    {i < step && (
                                        <motion.div
                                            initial={{ opacity: 0, x: -30, height: 0 }}
                                            animate={{ opacity: 1, x: 0, height: 'auto' }}
                                            transition={{ duration: 0.4, ease: 'easeOut' }}
                                            className={`p-3 rounded-xl border-l-4 ${isDark ? 'bg-white/[0.03] border border-white/5' : 'bg-gray-50 border border-gray-200'}`}
                                            style={{ borderLeftColor: p.color }}
                                        >
                                            <div className="flex items-center gap-2">
                                                <i className={`ph ${p.icon} text-base`} style={{ color: p.color }}></i>
                                                <span className={`text-sm font-bold ${isDark ? 'text-white' : 'text-gray-900'}`}>{p.label}</span>
                                                <span className={`ml-auto text-xs font-mono px-2 py-0.5 rounded-full ${isDark ? 'bg-white/5 text-gray-400' : 'bg-gray-100 text-gray-500'}`}>~{p.tokens.toLocaleString()} tokens</span>
                                            </div>
                                            <p className={`text-xs mt-1.5 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>{p.desc}</p>
                                        </motion.div>
                                    )}
                                </AnimatePresence>
                            ))}
                        </div>

                        {step >= pieces.length && (
                            <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.3 }}
                                className={`p-4 rounded-xl border ${isDark ? 'bg-f5-red/5 border-f5-red/20' : 'bg-red-50 border-red-200'}`}>
                                <p className={`text-sm font-medium ${isDark ? 'text-gray-200' : 'text-gray-700'}`}>
                                    <i className="ph ph-lightbulb text-f5-orange mr-1.5"></i>
                                    The AI doesn't just see your message — it sees <strong>all of this</strong> at once. Every token competes for the model's attention.
                                </p>
                            </motion.div>
                        )}

                        <button onClick={() => setStep(0)}
                            className={`text-xs font-medium px-4 py-2 rounded-lg transition-colors ${isDark ? 'bg-white/5 text-gray-400 hover:bg-white/10' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                            <i className="ph ph-arrow-counter-clockwise mr-1.5"></i>Replay
                        </button>

                    </div>
                );
            };

            // ── Context Overflow Simulator (embedded in WhatTab) ──
            const ContextOverflowSim = () => {
                const [windowSize, setWindowSize] = useState(8000);
                const [fillStep, setFillStep] = useState(0);
                const [playing, setPlaying] = useState(false);
                const presets = [
                    { label: '8K tokens', value: 8000 },
                    { label: '16K tokens', value: 16000 },
                    { label: '32K tokens (max)', value: 32000 },
                ];

                const contextBlocks = [
                    { label: 'System Prompt', tokens: 800, color: '#e4002b', icon: 'ph-gear', desc: 'Personality, rules, role definition' },
                    { label: 'Turn 1 — User', tokens: 200, color: '#00b4d8', icon: 'ph-user', desc: '"Summarize our Q3 sales report"' },
                    { label: 'Turn 1 — AI Response', tokens: 1500, color: '#6b7280', icon: 'ph-robot', desc: 'Detailed Q3 analysis with tables' },
                    { label: 'Turn 2 — User', tokens: 150, color: '#00b4d8', icon: 'ph-user', desc: '"Compare to Q2 numbers"' },
                    { label: 'Turn 2 — AI Response', tokens: 2000, color: '#6b7280', icon: 'ph-robot', desc: 'Quarter-over-quarter comparison' },
                    { label: 'Turn 3 — User + Doc', tokens: 3500, color: '#a855f7', icon: 'ph-file-text', desc: 'User pastes full 10-page contract' },
                    { label: 'Turn 3 — AI Response', tokens: 1800, color: '#6b7280', icon: 'ph-robot', desc: 'Contract clause analysis' },
                    { label: 'Turn 4 — User', tokens: 300, color: '#00b4d8', icon: 'ph-user', desc: '"Now review this second contract"' },
                    { label: 'Turn 4 — Doc Upload', tokens: 4200, color: '#a855f7', icon: 'ph-file-text', desc: 'Second 12-page contract pasted' },
                    { label: 'Turn 5 — User', tokens: 250, color: '#00b4d8', icon: 'ph-user', desc: '"Which contract has better terms?"' },
                    { label: 'Tool: Web Search', tokens: 2800, color: '#10b981', icon: 'ph-magnifying-glass', desc: 'Search results for market benchmarks' },
                    { label: 'Turn 5 — AI Response', tokens: 2000, color: '#6b7280', icon: 'ph-robot', desc: 'Comparative analysis with citations' },
                ];

                const done = fillStep >= contextBlocks.length;

                // Only advance when playing
                useEffect(() => {
                    if (!playing || done) { if (done) setPlaying(false); return; }
                    const t = setTimeout(() => setFillStep(s => s + 1), 800);
                    return () => clearTimeout(t);
                }, [playing, fillStep, done]);

                const handlePlay = () => { setPlaying(true); };
                const handleReset = () => { setPlaying(false); setFillStep(0); };
                const handlePreset = (val) => { setPlaying(false); setFillStep(0); setWindowSize(val); };

                const activeBlocks = contextBlocks.slice(0, fillStep);
                const runningTotal = activeBlocks.reduce((s, b) => s + b.tokens, 0);
                const usedPct = (runningTotal / windowSize) * 100;
                const isOverflow = runningTotal > windowSize;

                // Calculate which blocks are "evicted" (oldest first)
                let evictedTokens = 0;
                const evictedSet = new Set();
                if (isOverflow) {
                    const excess = runningTotal - windowSize;
                    let accumulated = 0;
                    for (let i = 0; i < activeBlocks.length; i++) {
                        accumulated += activeBlocks[i].tokens;
                        evictedSet.add(i);
                        if (accumulated >= excess) break;
                    }
                    evictedTokens = accumulated;
                }

                const consequences = [
                    { icon: 'ph-brain', title: 'Forgets Instructions', desc: 'The system prompt gets evicted first. The AI loses its persona, rules, and constraints — it may ignore safety guidelines or change tone mid-conversation.', color: '#e4002b' },
                    { icon: 'ph-chat-circle-x', title: 'Loses Early Context', desc: 'Early conversation turns vanish. The AI can\'t reference what you discussed before — it may contradict itself or ask you to repeat information.', color: '#ff6a13' },
                    { icon: 'ph-warning-diamond', title: 'Starts Hallucinating', desc: 'With incomplete context, the AI fills gaps with plausible-sounding but invented details. Confidence stays high even as accuracy drops.', color: '#a855f7' },
                ];

                return (
                    <div className="space-y-4">
                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <p className={`text-sm leading-relaxed ${isDark ? 'text-gray-300' : 'text-gray-600'}`}>
                                Every AI model has a <strong className={isDark ? 'text-white' : 'text-gray-900'}>context window</strong> — the maximum number of tokens it can see at once. Watch a real conversation fill up — then overflow — the window.
                            </p>
                        </div>

                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            {/* Window size presets + controls */}
                            <div className="flex items-center justify-between mb-4">
                                <div className="flex gap-2">
                                    {presets.map(p => (
                                        <button key={p.value} onClick={() => handlePreset(p.value)}
                                            className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${
                                                windowSize === p.value
                                                    ? 'bg-f5-red text-white shadow-lg'
                                                : (isDark ? 'bg-white/5 text-gray-400 hover:bg-white/10' : 'bg-gray-100 text-gray-500 hover:bg-gray-200')
                                        }`}>
                                        {p.label}
                                    </button>
                                ))}
                                </div>
                                <div className="flex gap-2">
                                    {!playing && !done && (
                                        <button onClick={handlePlay}
                                            className="px-4 py-1.5 rounded-lg text-xs font-bold text-white bg-gradient-to-r from-f5-red to-f5-orange hover:scale-105 transition-transform">
                                            <i className="ph ph-play-fill mr-1"></i>Play
                                        </button>
                                    )}
                                    {(playing || fillStep > 0) && (
                                        <button onClick={handleReset}
                                            className={`px-4 py-1.5 rounded-lg text-xs font-medium ${isDark ? 'bg-white/5 text-gray-400 hover:bg-white/10' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                                            <i className="ph ph-arrow-counter-clockwise mr-1"></i>Reset
                                        </button>
                                    )}
                                </div>
                            </div>

                            {/* Capacity bar */}
                            <div className="flex items-center justify-between mb-1.5">
                                <span className={`text-[10px] font-bold uppercase tracking-wider ${isOverflow ? 'text-red-400' : (isDark ? 'text-gray-500' : 'text-gray-500')}`}>
                                    {isOverflow ? 'OVERFLOW — oldest context evicted' : 'Context Window'}
                                </span>
                                <span className={`text-xs font-mono ${isOverflow ? 'text-red-400 font-bold' : (isDark ? 'text-gray-400' : 'text-gray-500')}`}>
                                    <AnimatedCounter value={runningTotal} className={isOverflow ? 'text-red-400' : (isDark ? 'text-white' : 'text-gray-900')} /> / {windowSize.toLocaleString()}
                                </span>
                            </div>
                            <div className={`w-full h-4 rounded-full overflow-hidden relative ${isDark ? 'bg-white/5' : 'bg-gray-100'}`}>
                                <motion.div className="h-full rounded-full"
                                    animate={{ width: `${Math.min(usedPct, 100)}%` }}
                                    transition={{ duration: 0.5, ease: 'easeOut' }}
                                    style={{ background: isOverflow ? 'linear-gradient(90deg, #ef4444, #dc2626)' : usedPct > 80 ? 'linear-gradient(90deg, #f59e0b, #ef4444)' : 'linear-gradient(90deg, #10b981, #059669)' }} />
                                {isOverflow && (
                                    <motion.div className="absolute inset-0 rounded-full"
                                        animate={{ opacity: [0.3, 0.6, 0.3] }}
                                        transition={{ duration: 1.5, repeat: Infinity }}
                                        style={{ background: 'linear-gradient(90deg, transparent, rgba(239,68,68,0.3), transparent)' }} />
                                )}
                            </div>

                            {/* Visual block stack — scrollable container */}
                            <div ref={el => { if (el) el.scrollTop = el.scrollHeight; }}
                                className={`mt-3 space-y-1 overflow-y-auto max-h-[260px] pr-1`}
                                style={{ scrollBehavior: 'smooth' }}>
                                {activeBlocks.map((block, i) => {
                                    const isEvicted = evictedSet.has(i);
                                    const widthPct = Math.max((block.tokens / windowSize) * 100, 8);
                                    return (
                                        <motion.div key={i}
                                            initial={{ opacity: 0, x: -20, height: 0 }}
                                            animate={{ opacity: isEvicted ? 0.55 : 1, x: 0, height: 'auto' }}
                                            transition={{ duration: 0.35 }}
                                            className={`flex items-center gap-2 px-2.5 py-2 rounded-lg text-xs ${
                                                isEvicted
                                                    ? (isDark ? 'bg-red-500/10 border border-red-500/20' : 'bg-red-50 border border-red-200')
                                                    : (isDark ? 'bg-white/[0.03]' : 'bg-gray-50')
                                            }`}
                                        >
                                            <i className={`ph ${block.icon} text-sm flex-shrink-0`} style={{ color: isEvicted ? '#ef4444' : block.color }}></i>
                                            <span className={`font-medium flex-shrink-0 ${isEvicted ? 'line-through text-red-400' : (isDark ? 'text-gray-300' : 'text-gray-700')}`}>{block.label}</span>
                                            <span className={`truncate flex-1 min-w-0 ${isDark ? 'text-gray-600' : 'text-gray-500'}`}>{block.desc}</span>
                                            {isEvicted ? (
                                                <span className={`flex-shrink-0 px-2 py-0.5 rounded text-[9px] font-bold uppercase ${isDark ? 'bg-red-500/20 text-red-400' : 'bg-red-100 text-red-500'}`}>evicted</span>
                                            ) : (
                                                <div className="ml-auto flex items-center gap-2 flex-shrink-0">
                                                    <div className={`w-16 h-1.5 rounded-full overflow-hidden ${isDark ? 'bg-white/5' : 'bg-gray-200'}`}>
                                                        <div className="h-full rounded-full" style={{ width: `${Math.min(widthPct, 100)}%`, backgroundColor: block.color, opacity: 0.6 }} />
                                                    </div>
                                                    <span className={`font-mono text-[10px] w-10 text-right ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>{(block.tokens / 1000).toFixed(1)}K</span>
                                                </div>
                                            )}
                                        </motion.div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Consequences — always visible below, never pushed off */}
                        <AnimatePresence>

                return (
