        // ============================================================
        // VECTORS — ALL ABOUT (Interactive Vector DB Explainer)
        // ============================================================
        const VectorExplainer = () => {
            const { isDark } = useTheme();
            const [activeTab, setActiveTab] = useState('what');

            // ── Tab 1: What are Vectors? ──
            const WhatTab = () => {
                const [step, setStep] = useState(0);
                const [playing, setPlaying] = useState(false);
                const words = [
                    { text: 'King', x: 72, y: 20, color: '#e4002b', group: 'royalty' },
                    { text: 'Queen', x: 82, y: 18, color: '#e4002b', group: 'royalty' },
                    { text: 'Man', x: 30, y: 55, color: '#00b4d8', group: 'people' },
                    { text: 'Woman', x: 40, y: 53, color: '#00b4d8', group: 'people' },
                    { text: 'Dog', x: 70, y: 75, color: '#10b981', group: 'animals' },
                    { text: 'Cat', x: 78, y: 80, color: '#10b981', group: 'animals' },
                    { text: 'Puppy', x: 65, y: 82, color: '#10b981', group: 'animals' },
                    { text: 'Paris', x: 20, y: 22, color: '#a855f7', group: 'places' },
                    { text: 'London', x: 15, y: 28, color: '#a855f7', group: 'places' },
                ];

                useEffect(() => {
                    if (!playing || step >= words.length) { if (step >= words.length) setPlaying(false); return; }
                    const t = setTimeout(() => setStep(s => s + 1), 600);
                    return () => clearTimeout(t);
                }, [playing, step]);

                return (
                    <div className="space-y-4">
                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <p className={`text-sm leading-relaxed ${isDark ? 'text-gray-300' : 'text-gray-600'}`}>
                                A <strong className={isDark ? 'text-white' : 'text-gray-900'}>vector</strong> is a list of numbers that captures the <em>meaning</em> of something — a word, an image, a document. Similar meanings produce similar numbers, so they end up <strong className={isDark ? 'text-white' : 'text-gray-900'}>close together in space</strong>.
                            </p>
                        </div>

                        <div className="flex items-center gap-2">
                            {!playing && step === 0 && <button onClick={() => { setPlaying(true); setStep(0); }} className="px-4 py-2 rounded-full text-xs font-bold text-white bg-gradient-to-r from-f5-red to-f5-orange hover:scale-105 transition-transform"><i className="ph ph-play-fill mr-1"></i>Play</button>}
                            {(playing || step > 0) && <button onClick={() => { setPlaying(false); setStep(0); }} className={`px-4 py-2 rounded-full text-xs font-medium ${isDark ? 'bg-white/5 text-gray-400 hover:bg-white/10' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}><i className="ph ph-arrow-counter-clockwise mr-1"></i>Reset</button>}
                        </div>

                        <div className={`p-4 rounded-xl relative ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`} style={{ height: 300 }}>
                            <div className={`absolute top-3 left-3 text-[9px] uppercase font-bold tracking-wider ${isDark ? 'text-gray-600' : 'text-gray-500'}`}>2D Vector Space</div>
                            {words.slice(0, step).map((w, i) => (
                                <motion.div key={w.text}
                                    initial={{ opacity: 0, scale: 0 }}
                                    animate={{ opacity: 1, scale: 1 }}

                                    style={{ left: `${w.x}%`, top: `${w.y}%`, transform: 'translate(-50%, -50%)' }}>
                                    <div className="w-3 h-3 rounded-full shadow-lg" style={{ backgroundColor: w.color }} />
                                    <span className="text-[10px] font-bold mt-0.5" style={{ color: w.color }}>{w.text}</span>
                                </motion.div>
                            ))}
                            {step >= words.length && (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 0.15 }}
                                    className="absolute inset-0 pointer-events-none">
                                    {[{ label: 'Royalty', x: 77, y: 19, r: 50 }, { label: 'People', x: 35, y: 54, r: 40 }, { label: 'Animals', x: 71, y: 79, r: 55 }, { label: 'Places', x: 17, y: 25, r: 40 }].map(c => (
                                        <div key={c.label} className="absolute rounded-full border-2 border-dashed" style={{ left: `${c.x}%`, top: `${c.y}%`, width: c.r * 2, height: c.r * 2, transform: 'translate(-50%, -50%)', borderColor: isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.2)' }} />

                            )}

                        {step >= words.length && (
                            <motion.div initial={{ opacity: 0, y: 8 }} animate={{ opacity: 1, y: 0 }}

                                    Notice how <strong>King/Queen</strong> cluster together, <strong>Dog/Cat/Puppy</strong> cluster together, and <strong>Paris/London</strong> cluster together. The AI learned these relationships from billions of text examples.
                                </p>
                            </motion.div>
                        )}
                    </div>
                );
            };

            // ── Tab 2: Similarity Search ──
            const SimilarityTab = () => {
                const [query, setQuery] = useState(0);
                const items = [
                    { text: 'How to train a puppy', vec: [0.82, 0.15, 0.91, 0.33] },
                    { text: 'Best dog food brands', vec: [0.79, 0.12, 0.88, 0.41] },
                    { text: 'Cat grooming tips', vec: [0.61, 0.22, 0.75, 0.55] },
                    { text: 'Python programming tutorial', vec: [0.11, 0.95, 0.08, 0.72] },
                    { text: 'JavaScript frameworks', vec: [0.15, 0.91, 0.12, 0.68] },
                    { text: 'Machine learning basics', vec: [0.35, 0.82, 0.28, 0.88] },
                    { text: 'Baking sourdough bread', vec: [0.44, 0.08, 0.22, 0.11] },
                    { text: 'Italian pasta recipes', vec: [0.48, 0.05, 0.19, 0.15] },
                ];
                const queries = [
                    { text: 'How to take care of a dog', vec: [0.80, 0.14, 0.89, 0.37] },
                    { text: 'Learn to code', vec: [0.13, 0.93, 0.10, 0.70] },
                    { text: 'Cooking at home', vec: [0.46, 0.07, 0.20, 0.13] },
                ];
                const q = queries[query];
                const cosSim = (a, b) => {
                    const dot = a.reduce((s, v, i) => s + v * b[i], 0);
                    const magA = Math.sqrt(a.reduce((s, v) => s + v * v, 0));
                    const magB = Math.sqrt(b.reduce((s, v) => s + v * v, 0));
                    return dot / (magA * magB);
                };
                const scored = items.map(it => ({ ...it, score: cosSim(q.vec, it.vec) })).sort((a, b) => b.score - a.score);

                return (
                    <div className="space-y-4">
                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <p className={`text-sm leading-relaxed ${isDark ? 'text-gray-300' : 'text-gray-600'}`}>
                                <strong className={isDark ? 'text-white' : 'text-gray-900'}>Similarity search</strong> finds vectors closest to your query — not by matching keywords, but by matching <em>meaning</em>. "How to take care of a dog" finds "puppy training" even though they share zero words.
                            </p>
                        </div>

                        <div className={`p-4 rounded-xl ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border border-gray-200'}`}>
                            <div className={`text-[9px] uppercase font-bold tracking-wider mb-2 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>Search Query</div>
                            <div className="flex gap-2">
                                {queries.map((qr, i) => (
                                    <button key={i} onClick={() => setQuery(i)}
                                        className={`px-3 py-2 rounded-lg text-xs font-medium transition-all ${query === i ? 'bg-f5-red text-white' : (isDark ? 'bg-white/5 text-gray-400 hover:bg-white/10' : 'bg-gray-100 text-gray-500 hover:bg-gray-200')}`}>
                                        "{qr.text}"
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className={`rounded-xl overflow-hidden ${isDark ? 'border border-white/10' : 'border border-gray-200'}`}>
                            <div className={`grid grid-cols-[1fr_80px_60px] px-4 py-2 text-[9px] uppercase font-bold tracking-wider ${isDark ? 'bg-white/[0.03] text-gray-500' : 'bg-gray-50 text-gray-400'}`}>
                                <span>Document</span><span className="text-center">Similarity</span><span className="text-center">Match</span>
                            </div>
                            {scored.map((item, i) => {
                                const pct = Math.round(item.score * 100);
                                const isTop3 = i < 3;
                                return (
                                    <motion.div key={item.text}
                                        initial={{ opacity: 0, x: -10 }}
                                        animate={{ opacity: 1, x: 0 }}
                                        transition={{ delay: i * 0.06 }}
                                        className={`grid grid-cols-[1fr_80px_60px] items-center px-4 py-2.5 ${
                                            isTop3 ? (isDark ? 'bg-emerald-500/5' : 'bg-emerald-50') : (isDark ? 'bg-white/[0.01]' : 'bg-white')
                                        }`}>
                                        <span className={`text-xs ${isTop3 ? (isDark ? 'text-white font-medium' : 'text-gray-900 font-medium') : (isDark ? 'text-gray-400' : 'text-gray-500')}`}>{item.text}</span>
                                        <div className="flex items-center gap-1.5 justify-center">
                                            <div className={`w-12 h-1.5 rounded-full overflow-hidden ${isDark ? 'bg-white/5' : 'bg-gray-200'}`}>
                                                <motion.div className="h-full rounded-full" initial={{ width: 0 }} animate={{ width: `${pct}%` }}
                                                    transition={{ delay: i * 0.06 + 0.2, duration: 0.4 }}
