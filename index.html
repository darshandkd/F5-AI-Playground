            border-radius: 3px 3px 0 0;

        .toggle-track {
            width: 44px; height: 24px; border-radius: 12px;

            transition: background 0.3s ease;
        }
        .toggle-track.active { background: linear-gradient(135deg, #e4002b, #ff6a13); }
        .toggle-thumb {
            position: absolute; top: 2px; left: 2px; width: 20px; height: 20px;

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback, useContext, createContext, memo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // ============================================================
        // CONTEXT: Theme
        // ============================================================
        const ThemeContext = createContext();
        const ThemeProvider = ({ children }) => {
            const [isDark, setIsDark] = useState(() => {
                const saved = sessionStorage.getItem('f5-theme');
                return saved ? saved === 'dark' : true;
            });
            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDark);
                document.body.className = isDark
                    ? 'dark bg-surface-950 text-white antialiased'
                    : 'bg-surface-25 text-gray-900 antialiased';
                sessionStorage.setItem('f5-theme', isDark ? 'dark' : 'light');
            }, [isDark]);
            return (
                <ThemeContext.Provider value={{ isDark, toggleTheme: () => setIsDark(p => !p) }}>
                    {children}
                </ThemeContext.Provider>
            );
        };
        const useTheme = () => useContext(ThemeContext);

        // ============================================================
        // HELP TOOLTIP (portal-based to escape overflow clipping)
        // ============================================================
        const HelpTooltip = ({ text }) => {
            const { isDark } = useTheme();
            const [show, setShow] = useState(false);
            const [pos, setPos] = useState({ top: 0, left: 0, below: false });
            const iconRef = useRef(null);

            const handleEnter = () => {
                if (!iconRef.current) return;
                const rect = iconRef.current.getBoundingClientRect();
                const spaceAbove = rect.top;
                const below = spaceAbove < 80;
                setPos({
                    top: below ? rect.bottom + 8 : rect.top - 8,
                    left: rect.left + rect.width / 2,
                    below
                });
                setShow(true);
            };

            return (
                <React.Fragment>
                    <span ref={iconRef}
                        className="inline-flex items-center"
                        onMouseEnter={handleEnter}
                        onMouseLeave={() => setShow(false)}
                        onClick={e => e.stopPropagation()}>
                        <span className={`flex items-center justify-center w-4 h-4 rounded-full text-[10px] font-bold cursor-help select-none ${isDark ? 'bg-white/10 text-gray-400 hover:bg-white/20' : 'bg-gray-200 text-gray-500 hover:bg-gray-300'} transition-colors`}>?</span>
                    </span>
                    {ReactDOM.createPortal(
                        <div className={`help-tip-popup ${show ? 'visible' : ''}`}
                            style={{
                                top: pos.below ? pos.top : 'auto',
                                bottom: pos.below ? 'auto' : `${window.innerHeight - pos.top}px`,
                                left: pos.left,
                                transform: 'translateX(-50%)',
                                width: '14rem',
                            }}>
                            <div className={`px-3 py-2 rounded-lg text-xs leading-relaxed shadow-lg ${isDark ? 'bg-gray-900 text-gray-200 border border-white/10' : 'bg-gray-800 text-white'}`}>
                                {text}
                                <span className={`absolute ${pos.below ? 'bottom-full border-b-gray-900' : 'top-full border-t-gray-900'} left-1/2 -translate-x-1/2 border-4 border-transparent ${pos.below ? (isDark ? 'border-b-gray-900' : 'border-b-gray-800') : (isDark ? 'border-t-gray-900' : 'border-t-gray-800')}`}></span>
                            </div>
                        </div>,
                        document.body
                    )}
                </React.Fragment>
            );
        };

        // ============================================================
        // NEURAL BACKGROUND (canvas particles)
        // ============================================================
        const NeuralBackground = memo(() => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = document.getElementById('neural-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animId;
                let particles = [];
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                resize();
                window.addEventListener('resize', resize);

                const PARTICLE_COUNT = Math.min(80, Math.floor(window.innerWidth / 20));
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.4,
                        vy: (Math.random() - 0.5) * 0.4,
                        r: Math.random() * 2 + 1,
                    });
                }

                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const isDark = document.documentElement.classList.contains('dark');
                    const color = '228,0,43';
                    const baseAlpha = isDark ? 0.15 : 0.05;

                    particles.forEach(p => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${color}, ${baseAlpha * 2})`;
                        ctx.fill();
                    });

                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 150) {
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = `rgba(${color}, ${baseAlpha * (1 - dist / 150)})`;
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }
                    animId = requestAnimationFrame(draw);
                };
                draw();
                return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
            }, []);
            return null;
        });

                    </svg>

        // ============================================================

        // --- INFERENCE TAB ---
        // Simulation: LLM Request Routing
        const SimRouting = ({ active }) => {
            const { isDark } = useTheme();
            const requestTypes = [
                { prompt: 'Write a Python sort', task: 'Code', complexity: 'complex', taskColor: '#a855f7', optimal: 0 },
                { prompt: 'What is 2+2?', task: 'Chat', complexity: 'simple', taskColor: '#00b4d8', optimal: 3 },
                { prompt: 'Analyze Q3 revenue', task: 'Reasoning', complexity: 'complex', taskColor: '#ff6a13', optimal: 1 },
                { prompt: 'Translate to French', task: 'Translation', complexity: 'simple', taskColor: '#10b981', optimal: 2 },
                { prompt: 'Summarize this doc', task: 'Summary', complexity: 'simple', taskColor: '#3b82f6', optimal: 2 },
                { prompt: 'Debug React component', task: 'Code', complexity: 'complex', taskColor: '#a855f7', optimal: 0 },
                { prompt: 'Draft meeting invite', task: 'Chat', complexity: 'simple', taskColor: '#00b4d8', optimal: 3 },
            ];
            const models = [
                { name: 'GPT-4o', size: '70B', cost: '$$', color: '#e4002b' },
                { name: 'Claude Sonnet', size: '~70B', cost: '$$', color: '#00b4d8' },
                { name: 'Llama 3 8B', size: '8B', cost: '$', color: '#10b981' },
                { name: 'Mistral 7B', size: '7B', cost: '$', color: '#ff6a13' },
            ];

            // Single request list with phase state machine — no independent classInfo/modelFlash
            const [requests, setRequests] = useState([]);
            const [util, setUtil] = useState([45, 30, 20, 15]);
            const idxRef = useRef(0);
            const landedRef = useRef(new Set());

            // Reset on toggle
            useEffect(() => {
                setRequests([]);
                setUtil(active ? [55, 50, 60, 45] : [85, 20, 15, 10]);
                idxRef.current = 0;
                landedRef.current.clear();
            }, [active]);

            // Spawn one request every 1500ms
            useEffect(() => {
                const spawn = () => {
                    const type = requestTypes[idxRef.current % requestTypes.length];
                    idxRef.current++;
                    const target = active ? type.optimal : Math.floor(Math.random() * 4);
                    const misrouted = !active && type.complexity === 'complex' && target >= 2;
                    setRequests(prev => [...prev.slice(-1), {
                        id: `r${Date.now()}`, ...type, target, misrouted,
                        phase: 'entering', phaseStart: Date.now(),
                    }]);
                };
                spawn();
                const interval = setInterval(spawn, active ? 4500 : 3000);
                return () => clearInterval(interval);
            }, [active]);

            // Single phase-progression tick: entering → atBNK → landed → done
            useEffect(() => {
                const tick = () => {
                    const now = Date.now();
                    setRequests(prev => {
                        let changed = false;
                        const next = prev.map(r => {
                            const elapsed = now - r.phaseStart;
                            // Phase 1: request pill appears on left
                            if (r.phase === 'entering' && elapsed > 1000) {
                                changed = true;
                                // If BNK is active, go to classification; otherwise skip straight to landed
                                if (active) return { ...r, phase: 'atBNK', phaseStart: now };
                                // No BNK — go directly to LLM
                                if (!landedRef.current.has(r.id)) {
                                    landedRef.current.add(r.id);
                                    setUtil(u => u.map((v, i) =>
                                        i === r.target
                                            ? Math.min(95, v + Math.floor(Math.random() * 10 + 3))
                                            : Math.max(10, v - 1)
                                    ));
                                }
                                return { ...r, phase: 'landed', phaseStart: now };
                            }
                            // Phase 2: BNK classifies — pill stays, BNK lights up (1.5s)
                            if (r.phase === 'atBNK' && elapsed > 1500) {
                                changed = true;
                                if (!landedRef.current.has(r.id)) {
                                    landedRef.current.add(r.id);
                                    setUtil(u => u.map((v, i) =>
                                        i === r.target
                                            ? Math.min(95, v + (active ? 3 : Math.floor(Math.random() * 10 + 3)))
                                            : Math.max(10, v - 1)
                                    ));
                                }
                                return { ...r, phase: 'landed', phaseStart: now };
                            }
                            // Phase 3: LLM highlights — pill fades out (1.5s)
                            if (r.phase === 'landed' && elapsed > 1500) {
                                changed = true;
                                return null;
                            }
                            return r;
                        }).filter(Boolean);
                        return changed ? next : prev;
                    });
                };
                const interval = setInterval(tick, 100);
                return () => clearInterval(interval);
            }, [active]);

            // Derived state — pill visible throughout, BNK during atBNK, LLM during landed
            const visibleReqs = requests.filter(r => r.phase !== 'done');
            const activeReq = active ? requests.find(r => r.phase === 'atBNK') : null;
            const landedReq = requests.find(r => r.phase === 'landed');

            return (
                <div className="p-4 h-full flex flex-col overflow-hidden">
                    <div className="flex-1 flex items-stretch gap-1 min-h-0">
                        {/* Incoming Requests */}
                        <div className="w-[25%] flex flex-col">
                            <div className={`text-xs font-bold uppercase tracking-wider mb-2 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>Incoming</div>
                            <div className="flex-1 flex flex-col gap-1.5 justify-center overflow-hidden">
                                <AnimatePresence>
                                    {visibleReqs.slice(-2).map(r => {
                                        const atBnk = r.phase === 'atBNK';
                                        const landed = r.phase === 'landed';
                                        return (
                                            <motion.div key={r.id}
                                                initial={{ opacity: 0, x: -20 }}
                                                animate={{ opacity: landed ? 0.4 : 1, x: 0 }}
                                                exit={{ opacity: 0, x: 20 }}
                                                transition={{ duration: 0.4, ease: 'easeInOut' }}
                                                className={`px-2 py-1.5 rounded-lg border-2 transition-colors duration-300 ${
                                                    atBnk && active ? (isDark ? 'bg-f5-red/10 border-f5-red/40' : 'bg-red-50 border-red-300')
                                                    : landed ? (isDark ? 'bg-emerald-500/5 border-emerald-500/30' : 'bg-green-50 border-green-300')
                                                    : (isDark ? 'bg-white/5 border-white/10' : 'bg-gray-50 border-gray-200')
                                                } ${r.complexity === 'complex' ? 'ring-1 ring-purple-500/30' : ''}`}
                                            >

                                                <span className="text-xs font-medium px-1.5 rounded mt-0.5 inline-block"
                                                    style={{ backgroundColor: r.taskColor + '18', color: r.taskColor }}>{r.task}</span>
                                            </motion.div>
                                        );
                                    })}
                                </AnimatePresence>
                            </div>
                        </div>

                        <div className={`flex items-center px-1 text-lg ${isDark ? 'text-gray-600' : 'text-gray-500'}`}>›</div>

                        {/* BNK Gateway */}
                        <div className="w-[23%] flex items-center justify-center">
                            {active ? (
                                <div className={`w-full rounded-xl border-2 p-3 ${isDark ? 'bg-f5-red/5 border-f5-red/20' : 'bg-red-50/80 border-red-200'}`}>
                                    <div className="text-sm font-bold text-f5-red">F5 BNK</div>
                                    <div className={`text-xs mb-2 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>BlueField-3 DPU</div>
                                    <div className="space-y-1">
                                        {['Task', 'Complexity', 'Cost', 'Load'].map((dim, di) => (
                                            <div key={dim} className="flex items-center justify-between text-xs">

                                                    <span className={isDark ? 'text-gray-400' : 'text-gray-500'}>{dim}</span>

                                        style={isLanded ? {
                                            borderColor: warn ? '#f97316' : m.color,
                                            backgroundColor: warn ? undefined : (isDark ? m.color + '15' : m.color + '10'),

                                            transform: 'scale(1.02)',

                                                <span className={`text-sm transition-all duration-300 ${isLanded && !warn ? 'font-bold' : 'font-medium'} ${isDark ? 'text-gray-200' : 'text-gray-800'}`} style={isLanded && !warn ? { color: m.color } : {}}>{m.name}</span>
                                                <span className={`text-xs ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>{m.size}</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                {warn && <span className="text-xs text-orange-500 font-bold">⚠</span>}

                                                <span className={`text-xs font-mono w-7 text-right ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>{util[i]}%</span>

                                        </div>
                                        <div className={`h-2.5 rounded-full overflow-hidden mt-1.5 ${isDark ? 'bg-white/10' : 'bg-gray-100'}`}>
                                            <motion.div className="h-full rounded-full" initial={false}
                                                animate={{ width: `${util[i]}%` }}
                                                transition={{ duration: 0.5, ease: 'easeOut' }}

                    </div>

                    {/* Status bar */}
                    <div className={`mt-3 pt-2 flex flex-wrap items-center justify-between gap-2 border-t ${isDark ? 'border-white/10' : 'border-gray-100'}`}>

                            {active ? 'Policy-driven routing' : 'Round-robin routing'}
                        </span>
                        <span className={`text-xs ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>
                            {active ? '~60% cost reduction · Balanced load · 0% CPU (DPU)' : 'No optimization · Unbalanced load'}
                        </span>
                    </div>
                </div>
            );
        };

        // Simulation: Semantic Caching
        const SimCaching = ({ active, toggles = {}, onStats }) => {
            const { isDark } = useTheme();
            const bnkActive = toggles.bnk || false;
            const [log, setLog] = useState([]);
            const [totals, setTotals] = useState({ queries: 0, hits: 0, tokensSaved: 0, costSaved: 0 });
            const cachedRef = React.useRef(new Set());
            const seenRef = React.useRef(new Set());
            const idxRef = React.useRef(0);

            const canonicals = React.useMemo(() => [
                'What is machine learning?', 'How does TCP/IP work?',
                'What is Kubernetes?', 'Compare Python vs Rust',
            ], []);

            const sequence = React.useMemo(() => [
                { text: 'What is machine learning?', cluster: 0, tokens: 3800, cost: 0.038, latency: 1.2 },
                { text: 'How does TCP/IP work?', cluster: 1, tokens: 4200, cost: 0.042, latency: 1.4 },
                { text: 'Explain ML to me', cluster: 0, tokens: 3800, cost: 0.038, latency: 1.3, similarity: 0.94, canonical: 'What is machine learning?' },
                { text: 'What is Kubernetes?', cluster: 2, tokens: 3500, cost: 0.035, latency: 1.1 },
                { text: 'Explain TCP networking', cluster: 1, tokens: 4200, cost: 0.042, latency: 1.5, similarity: 0.89, canonical: 'How does TCP/IP work?' },
                { text: 'Compare Python vs Rust', cluster: 3, tokens: 5100, cost: 0.051, latency: 1.8 },
                { text: 'Define ML in simple terms', cluster: 0, tokens: 3800, cost: 0.038, latency: 1.1, similarity: 0.91, canonical: 'What is machine learning?' },
                { text: 'Explain K8s orchestration', cluster: 2, tokens: 3500, cost: 0.035, latency: 1.3, similarity: 0.92, canonical: 'What is Kubernetes?' },
            ], []);

            // Reset on any toggle change
            useEffect(() => {
                setLog([]);
                setTotals({ queries: 0, hits: 0, tokensSaved: 0, costSaved: 0 });
                cachedRef.current = new Set();
                seenRef.current = new Set();
                idxRef.current = 0;
            }, [bnkActive]);

            useEffect(() => {
                const process = () => {
                    const prompt = sequence[idxRef.current % sequence.length];
                    idxRef.current++;
                    const isHit = bnkActive && cachedRef.current.has(prompt.cluster);

                    // Always track seen clusters for repeat detection
                    const isRepeat = !bnkActive && seenRef.current.has(prompt.cluster);
                    seenRef.current.add(prompt.cluster);

                    // Compute path string and suffix based on toggle combo
                    let path, suffix = '';
                    if (isHit) {
                        path = null; // HITs show match info instead
                    } else {
                        const parts = [];
                        if (bnkActive) parts.push('BNK');
                        parts.push('LLM');
                        path = parts.join(' → ');
                        if (bnkActive) suffix = 'cached';
                    }

                    // Compute latency based on toggle combo
                    const latency = isHit
                        ? (bnkActive ? 0.035 : 0.048)
                        : (bnkActive ? prompt.latency * 0.78 : prompt.latency);

                    const entry = {
                        id: Date.now() + Math.random(),
                        text: prompt.text, hit: isHit, path, suffix,
                        matchedTo: isHit ? (prompt.canonical || canonicals[prompt.cluster]) : null,
                        similarity: isHit ? prompt.similarity : null,
                        latency, cost: isHit ? 0 : prompt.cost,
                        savedCost: isHit ? prompt.cost : 0,
                        savedTokens: isHit ? prompt.tokens : 0,
                        tokens: isHit ? 0 : prompt.tokens,
                        isRepeat,
                    };

                    setLog(prev => [entry, ...prev].slice(0, 6));
                    setTotals(prev => ({
                        queries: prev.queries + 1,
                        hits: prev.hits + (isHit ? 1 : 0),
                        tokensSaved: prev.tokensSaved + entry.savedTokens,
                        costSaved: prev.costSaved + entry.savedCost,
                    }));

                    if (bnkActive && !isHit) {
                        cachedRef.current = new Set([...cachedRef.current, prompt.cluster]);
                    }
                };

                process();
                const interval = setInterval(process, 2000);
                return () => clearInterval(interval);
            }, [bnkActive, sequence, canonicals]);

            const hitRate = totals.queries > 0 ? Math.round((totals.hits / totals.queries) * 100) : 0;

            useEffect(() => {
                if (onStats && totals.queries > 0) {
                    const costReduction = hitRate > 0 ? hitRate : 0;
                    const monthlySaved = (totals.costSaved * 30 * 60 * 12).toFixed(0);
                    const monthlyBase = 12000;
                    const monthlyAfter = Math.max(monthlyBase - monthlySaved, monthlyBase * (1 - costReduction / 100));
                    onStats({
                        'Token Cost': { after: `$${(monthlyAfter / 1000).toFixed(1)}K/mo`, change: `${costReduction}% reduction` },
                        'Cache Hit Rate': { after: `${hitRate}%`, change: hitRate > 0 ? 'Semantic dedup' : 'No hits yet' },
                        'Cached Response': { after: hitRate > 0 ? '<50ms' : '1.2s', change: hitRate > 0 ? `${Math.round(1200 / 48)}x faster` : 'No cache' },
                    });
                }
            }, [totals, hitRate, onStats]);

            return (
                <div className="px-4 pt-16 pb-3 h-full flex flex-col overflow-hidden">
                    {/* Column headers */}
                    <div className={`flex items-center gap-2 pb-2 mb-1 border-b flex-shrink-0 ${isDark ? 'border-white/10' : 'border-gray-200'}`}>
                        <div className={`flex-[3] text-xs font-bold uppercase tracking-wider ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>Query</div>
                        <div className={`flex-[4] text-xs font-bold uppercase tracking-wider ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>Decision</div>
                        <div className={`w-16 text-xs font-bold uppercase tracking-wider text-right ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>Cost</div>
                        <div className={`w-14 text-xs font-bold uppercase tracking-wider text-right ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>Time</div>
                    </div>

                    {/* Log entries — full width */}
                    <div className="flex-1 flex flex-col gap-0.5 overflow-hidden min-h-0">
                        {log.map((entry, i) => {
                            const opacity = i === 0 ? 1 : Math.max(0.3, 1 - i * 0.15);
                            const row = (
                                <div className={`flex items-baseline gap-2 py-2 px-2 rounded-lg`}
                                    style={{
                                        borderLeft: entry.hit ? '3px solid #10b981' : '3px solid transparent',
                                        backgroundColor: entry.hit ? (isDark ? 'rgba(16,185,129,0.10)' : 'rgba(16,185,129,0.08)') : (isDark ? 'rgba(16,185,129,0.10)' : 'rgba(16,185,129,0.08)'),
                                        opacity,
                                    }}>
                                    <div className={`flex-[3] min-w-0 text-sm truncate font-medium ${isDark ? 'text-gray-200' : 'text-gray-800'}`}>
                                        "{entry.text}"
                                    </div>
                                    <div className="flex-[4] min-w-0 truncate">
                                        {entry.hit ? (
                                            <span className="text-xs">
                                                <span className="text-f5-green font-semibold">
                                                    <i className="ph ph-lightning-fill mr-1"></i>Cache Hit
                                                </span>
                                                {entry.matchedTo && entry.matchedTo !== entry.text && (
                                                    <span className={`ml-1.5 ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>
                                                        · "{entry.matchedTo}" {entry.similarity.toFixed(2)}
                                                    </span>
                                                )}
                                            </span>
                                        ) : (
                                            <span className="text-xs">
                                                <span className={`font-medium ${isDark ? 'text-gray-300' : 'text-gray-500'}`}>
                                                    {bnkActive ? '✦' : '—'} {bnkActive ? `via ${entry.path}` : 'Direct → LLM'}
                                                </span>
                                                {entry.suffix && (
                                                    <span className={`ml-1.5 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>· {entry.suffix}</span>
                                                )}
                                                {entry.isRepeat && (
                                                    <span className="text-orange-400 ml-1.5 font-medium">(repeat)</span>
                                                )}
                                            </span>
                                        )}
                                    </div>
                                    <div className={`w-16 text-right text-xs font-mono ${entry.hit ? 'text-f5-green font-bold' : (isDark ? 'text-gray-300' : 'text-gray-700')}`}>
                                        ${entry.cost.toFixed(3)}
                                    </div>
                                    <div className={`w-14 text-right text-xs font-mono ${entry.hit ? 'text-f5-green' : (isDark ? 'text-gray-300' : 'text-gray-700')}`}>
                                        {entry.latency < 0.1 ? `${(entry.latency * 1000).toFixed(0)}ms` : `${entry.latency.toFixed(1)}s`}
                                    </div>
                                </div>
                            );
                            return i === 0 ? (
                                <motion.div key={entry.id}
                                    initial={{ opacity: 0, y: -6 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    transition={{ duration: 0.4, ease: 'easeOut' }}>
                                    {row}
                                </motion.div>
                            ) : <div key={entry.id}>{row}</div>;
                        })}
                    </div>

                    {/* Stats row */}
                    <div className={`flex-shrink-0 mt-2 pt-3 border-t ${isDark ? 'border-white/10' : 'border-gray-200'}`}>
                        <div className="grid grid-cols-4 gap-3">
                            <div className={`px-3 py-2 rounded-lg ${isDark ? 'bg-white/[0.03]' : 'bg-gray-50'}`}>
                                <div className={`text-[9px] uppercase tracking-wider font-medium mb-1 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>Hit Rate</div>
                                <div className="flex items-center gap-2">
                                    <div className={`flex-1 h-2 rounded-full overflow-hidden ${isDark ? 'bg-white/[0.08]' : 'bg-gray-200'}`}>
                                        <div className="h-full rounded-full" style={{
                                            width: `${hitRate}%`,
                                            backgroundColor: hitRate > 50 ? '#10b981' : hitRate > 0 ? '#ff6a13' : 'transparent',
                                            transition: 'width 0.8s ease-out, background-color 0.5s',
                                        }} />
                                    </div>
                                    <span className={`text-sm font-bold font-mono ${
                                        hitRate > 50 ? 'text-f5-green' : hitRate > 0 ? 'text-orange-400' : (isDark ? 'text-gray-600' : 'text-gray-500')
                                    }`}>{hitRate}%</span>
                                </div>
                            </div>
                            <div className={`px-3 py-2 rounded-lg ${isDark ? 'bg-white/[0.03]' : 'bg-gray-50'}`}>
                                <div className={`text-[9px] uppercase tracking-wider font-medium mb-1 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>Tokens Saved</div>
                                <div className={`text-sm font-bold font-mono ${totals.tokensSaved > 0 ? 'text-f5-green' : (isDark ? 'text-gray-400' : 'text-gray-500')}`}>
                                    {(totals.tokensSaved / 1000).toFixed(1)}K
                                </div>
                            </div>
                            <div className={`px-3 py-2 rounded-lg ${isDark ? 'bg-white/[0.03]' : 'bg-gray-50'}`}>
                                <div className={`text-[9px] uppercase tracking-wider font-medium mb-1 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>Cost Saved</div>
                                <div className={`text-sm font-bold font-mono ${totals.costSaved > 0 ? 'text-f5-green' : (isDark ? 'text-gray-400' : 'text-gray-500')}`}>
                                    ${totals.costSaved.toFixed(3)}
                                </div>
                            </div>
                            <div className={`px-3 py-2 rounded-lg ${isDark ? 'bg-white/[0.03]' : 'bg-gray-50'}`}>
                                <div className={`text-[9px] uppercase tracking-wider font-medium mb-1 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>Queries</div>
                                <div className={`text-sm font-bold font-mono ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>{totals.queries}</div>
                            </div>
                        </div>
                    </div>

                    {/* Status bar */}
                    <div className={`mt-2 text-xs font-medium ${
                        bnkActive ? 'text-f5-green' : (isDark ? 'text-gray-500' : 'text-gray-500')
                    }`}>
                        {bnkActive ? 'BNK-accelerated semantic caching active'
                            : 'No caching · All prompts sent to LLM'}
                    </div>
                </div>
            );
        };

        // Simulation: GPU Utilization
        const SimGPU = ({ active }) => {
            const { isDark } = useTheme();
            // Rotating hot GPU sets — which GPUs are overloaded shifts every ~4s
            const hotSets = React.useMemo(() => [
                [0,3], [2,5], [1,6], [4,7], [0,5,7], [2,3,6], [1,4], [3,5,7],
            ], []);
            const hotSetIdx = React.useRef(0);
            const tickCount = React.useRef(0);
            // Start with GPU 0 and 3 already hot so red shows immediately
            const [bars, setBars] = useState([90, 28, 40, 92, 22, 55, 35, 20]);
            useEffect(() => {
                const interval = setInterval(() => {
                    tickCount.current++;
                    // Rotate which GPUs are hot every 8 ticks (~4s)
                    if (tickCount.current % 8 === 0) {
                        hotSetIdx.current = (hotSetIdx.current + 1) % hotSets.length;
                    }
                    const currentHot = hotSets[hotSetIdx.current];
                    setBars(prev => prev.map((v, i) => {
                        if (active) return 65 + (Math.random() - 0.5) * 10;
                        const isHot = currentHot.includes(i);
                        // Hot GPUs target 90%, cold GPUs target 18-30%
                        const target = isHot ? 90 + Math.random() * 5 : 18 + Math.random() * 12;
                        // Fast drift so hot GPUs reach 90 in ~2-3s (4-6 ticks)
                        const drift = (target - v) * 0.25;
                        return Math.max(10, Math.min(95, v + drift + (Math.random() - 0.5) * 3));
                    }));
                }, 500);
                return () => clearInterval(interval);
            }, [active, hotSets]);

            return (
                <div className="p-6 h-full min-h-0 flex flex-col justify-center gap-4">
                    <div className="flex items-end justify-center gap-3 h-40">
                        {bars.map((load, i) => (
                            <div key={i} className="flex-1 flex flex-col items-center gap-1">
                                <div className={`w-full rounded-t-lg relative overflow-hidden h-36 ${isDark ? 'bg-white/5' : 'bg-gray-100'}`}>
                                    <motion.div
                                        className={`absolute bottom-0 w-full rounded-t-lg transition-colors duration-300 ${
                                            load > 85 ? 'bg-red-500' : (load < 30 ? (isDark ? 'bg-gray-600' : 'bg-gray-300') : (active ? 'bg-f5-cyan' : 'bg-orange-500'))
                                        }`}
                                        animate={{ height: `${load}%` }}
                                        transition={{ duration: 0.3 }}
                                    />
                                    {active && <div className="absolute bottom-[65%] w-full border-t border-dashed border-white/30 z-10" />}
                                </div>
                                <span className={`text-[10px] font-mono font-bold ${load > 85 ? 'text-red-500' : (isDark ? 'text-gray-500' : 'text-gray-500')}`}>
                                    {Math.round(load)}%
                                </span>
                                <span className={`text-[8px] uppercase font-bold ${isDark ? 'text-gray-600' : 'text-gray-500'}`}>GPU {i}</span>
                            </div>
                        ))}
                    </div>
                    <div className={`text-center text-[10px] font-bold uppercase tracking-wider ${active ? 'text-f5-green' : 'text-orange-500'}`}>
                        {active ? 'DPU Offload: Balanced utilization ~65%' : 'CPU bottleneck: Uneven GPU utilization'}
                    </div>
                </div>
            );
        };

        // Simulation: Token Governance
        const SimTokenGov = ({ active, toggles = {} }) => {
            const { isDark } = useTheme();
            const bnkActive = toggles.bnk || false;
            const anyActive = bnkActive;

            const tierDefs = React.useMemo(() => ({
                'Enterprise': { budget: 500000, color: '#e4002b', models: ['GPT-4o', 'Claude Sonnet', 'GPT-4o-mini', 'Llama 8B'] },
                'Standard':   { budget: 100000, color: '#ff6a13', models: ['GPT-4o-mini', 'Llama 8B'] },
                'Free Tier':  { budget: 10000,  color: '#00b4d8', models: ['Llama 8B'] },
            }), []);

            const sequence = React.useMemo(() => [
                { consumer: 'Enterprise', model: 'GPT-4o',       tokens: 4200,  costPer1K: 0.01,  prompt: 'Analyze Q3 revenue trends' },
                { consumer: 'Standard',   model: 'GPT-4o-mini',  tokens: 2100,  costPer1K: 0.004, prompt: 'Summarize this document' },
                { consumer: 'Free Tier',  model: 'Llama 8B',     tokens: 1800,  costPer1K: 0.001, prompt: 'What is machine learning?' },
                { consumer: 'Enterprise', model: 'Claude Sonnet', tokens: 3500, costPer1K: 0.01,  prompt: 'Debug this Python function' },
                { consumer: 'Free Tier',  model: 'GPT-4o',       tokens: 12800, costPer1K: 0.01,  prompt: 'Write a 5000-word novel' },
                { consumer: 'Standard',   model: 'GPT-4o-mini',  tokens: 3200,  costPer1K: 0.004, prompt: 'Translate email to Spanish' },
                { consumer: 'Enterprise', model: 'GPT-4o',       tokens: 5100,  costPer1K: 0.01,  prompt: 'Generate test cases for API' },
                { consumer: 'Standard',   model: 'Claude Sonnet', tokens: 8500, costPer1K: 0.01,  prompt: 'Write quarterly report' },
                { consumer: 'Free Tier',  model: 'Llama 8B',     tokens: 5200,  costPer1K: 0.001, prompt: 'Explain Kubernetes basics' },
                { consumer: 'Enterprise', model: 'GPT-4o',       tokens: 6800,  costPer1K: 0.01,  prompt: 'Create marketing strategy' },
            ], []);

            const [log, setLog] = useState([]);
            const [budgets, setBudgets] = useState({ 'Enterprise': 0, 'Standard': 0, 'Free Tier': 0 });
            const budgetsRef = React.useRef({ 'Enterprise': 0, 'Standard': 0, 'Free Tier': 0 });
            const [totals, setTotals] = useState({ requests: 0, allowed: 0, blocked: 0 });
            const idxRef = React.useRef(0);

            useEffect(() => {
                setLog([]);
                const reset = { 'Enterprise': 0, 'Standard': 0, 'Free Tier': 0 };
                setBudgets(reset);
                budgetsRef.current = { ...reset };
                setTotals({ requests: 0, allowed: 0, blocked: 0 });
                idxRef.current = 0;
            }, [bnkActive]);

            useEffect(() => {
                const processRequest = () => {
                    const req = sequence[idxRef.current % sequence.length];
                    idxRef.current++;
                    const cost = (req.tokens / 1000) * req.costPer1K;
                    const tier = tierDefs[req.consumer];

                    let decision, blocked = false, reason = '';
                    if (!anyActive) {
                        decision = 'unmetered';
                        reason = 'No governance';
                    } else {
                        const modelAllowed = tier.models.includes(req.model);
                        const currentUsage = budgetsRef.current[req.consumer] || 0;
                        const wouldExceed = (currentUsage + req.tokens) > tier.budget;
                        if (!modelAllowed) {
                            decision = 'blocked'; blocked = true;
                            reason = `${req.model} not in tier`;
                        } else if (wouldExceed) {
                            decision = 'blocked'; blocked = true;
                            reason = 'Budget exceeded';
                        } else if ((currentUsage + req.tokens) > tier.budget * 0.85) {
                            decision = 'throttled';
                            reason = 'Approaching limit';
                        } else {
                            decision = 'allowed';
                        }
                    }

                    const currentUsage = budgetsRef.current[req.consumer] || 0;
                    const usageAfter = anyActive && !blocked ? currentUsage + req.tokens : currentUsage;

                    const entry = {
                        id: Date.now() + Math.random(),
                        consumer: anyActive ? req.consumer : '(unknown)',
                        model: req.model, tokens: req.tokens, cost, prompt: req.prompt,
                        decision, blocked, reason, usageAfter, budget: tier.budget,
                    };

                    setLog(prev => [entry, ...prev].slice(0, 6));
                    if (anyActive && !blocked) {
                        budgetsRef.current = { ...budgetsRef.current, [req.consumer]: budgetsRef.current[req.consumer] + req.tokens };
                        setBudgets({ ...budgetsRef.current });
                    }
                    setTotals(prev => ({
                        requests: prev.requests + 1,
                        allowed: prev.allowed + (blocked ? 0 : 1),
                        blocked: prev.blocked + (blocked ? 1 : 0),
                    }));
                };

                processRequest();
                const interval = setInterval(processRequest, 2000);
                return () => clearInterval(interval);
            }, [bnkActive, sequence, tierDefs, anyActive]);

            return (
                <div className="px-4 pt-16 pb-3 h-full flex flex-col overflow-hidden">
                    {/* Column headers */}
                    <div className={`flex items-center gap-2 pb-2 mb-1 border-b flex-shrink-0 ${isDark ? 'border-white/10' : 'border-gray-200'}`}>

                        <div className={`flex-1 text-xs font-bold uppercase tracking-wider ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>Request</div>
                        <div className={`w-12 text-xs font-bold uppercase tracking-wider text-right ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>Tokens</div>

                    {/* Log entries */}
                    <div className="flex-1 flex flex-col gap-0.5 overflow-hidden min-h-0">
                        {log.map((entry, i) => {

                            const opacity = i === 0 ? 1 : Math.max(0.3, 1 - i * 0.15);

                                        </span>
                                        <span className={`w-20 text-right text-xs font-semibold flex-shrink-0 ${
                                            entry.decision === 'allowed' ? 'text-f5-green'
                                            : entry.decision === 'throttled' ? 'text-orange-400'
                                            : entry.decision === 'blocked' ? 'text-red-500'
                                            : (isDark ? 'text-gray-500' : 'text-gray-500')
                                        }`}>
                                            {entry.decision === 'allowed' && '✓ Allowed'}
                                            {entry.decision === 'throttled' && '⚠ Throttled'}
                                            {entry.decision === 'blocked' && '✕ Blocked'}
                                            {entry.decision === 'unmetered' && '— No limit'}
                                        </span>
                                    </div>
                                    <div className="flex items-center gap-2 mt-0.5 pl-[104px]">
                                        <span className={`text-xs ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>
                                            {entry.model} · ${entry.cost.toFixed(3)}
                                        </span>
                                        {anyActive && !entry.blocked && entry.decision !== 'unmetered' && (
                                            <span className={`text-xs font-mono ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>
                                                · {(entry.usageAfter / 1000).toFixed(0)}K/{(entry.budget / 1000).toFixed(0)}K
                                            </span>
                                        )}
                                        {entry.blocked && (
                                            <span className="text-xs text-red-400">{entry.reason}</span>
                                        )}

                                </div>

                            return i === 0 ? (
                                <motion.div key={entry.id}

                                    {row}
                                </motion.div>

                    </div>

                    {/* Budget status bars */}
                    <div className={`flex items-center gap-3 flex-shrink-0 mt-2 pt-2 border-t ${isDark ? 'border-white/10' : 'border-gray-200'}`}>
                        {['Enterprise', 'Standard', 'Free Tier'].map(name => {
                            const tier = tierDefs[name];
                            const used = budgets[name] || 0;
                            const pct = anyActive ? Math.min(100, (used / tier.budget) * 100) : 0;
                            const atLimit = pct >= 95;
                            return (
                                <div key={name} className="flex-1 flex items-center gap-1.5">
                                    <span className="text-xs font-medium flex-shrink-0" style={{ color: tier.color, minWidth: '40px' }}>
                                        {name === 'Free Tier' ? 'Free' : name === 'Enterprise' ? 'Ent.' : 'Std.'}
                                    </span>
                                    <div className={`flex-1 h-2 rounded-full overflow-hidden ${isDark ? 'bg-white/[0.06]' : 'bg-gray-100'}`}>
                                        <div className="h-full rounded-full" style={{
                                            width: `${pct}%`,
                                            backgroundColor: atLimit ? '#ef4444' : tier.color,
                                            transition: 'width 0.8s ease-out',
                                        }} />
                                    </div>
                                    <span className={`text-xs font-mono w-8 text-right ${atLimit ? 'text-red-500' : (isDark ? 'text-gray-500' : 'text-gray-500')}`}>
                                        {anyActive ? `${Math.round(pct)}%` : '—'}
                                    </span>
                                </div>
                            );
                        })}
                    </div>

                    {/* Status bar */}
                    <div className={`mt-2 text-xs font-medium ${anyActive ? 'text-f5-green' : (isDark ? 'text-gray-500' : 'text-gray-500')}`}>
                        {bnkActive ? 'F5 BNK · DPU-accelerated token metering & budget enforcement'
                            : 'No governance · All requests unmetered & unbudgeted'}
                    </div>
                </div>
            );
        };

        // Simulation: RAG Pipeline
        const SimRAG = ({ active, toggles = {} }) => {
            const { isDark } = useTheme();
            const [rows, setRows] = useState([]);
            const idxRef = React.useRef(0);

            const bigipActive = toggles.bigip ?? active;

            const OPS = [
                { stage: 'INGEST', name: 'quarterly-report.pdf', size: '48 MB', fast: '3.2 GB/s', slow: '400 MB/s', canFail: false },
                { stage: 'RETRIEVE', name: '"Q3 revenue trends"', size: '12 chunks', fast: '8ms', slow: '45ms', canFail: false },
                { stage: 'INGEST', name: 'product-catalog.json', size: '124 MB', fast: '3.2 GB/s', slow: '400 MB/s', canFail: true },

                { stage: 'INGEST', name: 'support-tickets.csv', size: '340 MB', fast: '3.2 GB/s', slow: '400 MB/s', canFail: true },
                { stage: 'GENERATE', name: '"Draft response"', size: '22KB ctx', fast: '0.8s', slow: '2.1s', canFail: false },

            const computeDetail = (stage) => {
                if (stage === 'INGEST') {
                    if (bigipActive && bnkActive) return 'S3 profile + DPU · mTLS · policy-routed';
                    if (bigipActive) return 'S3 profile · mTLS · policy-routed';

                    return 'Default TCP · no optimization';

                if (stage === 'RETRIEVE') {
                    if (bigipActive && bnkActive) return 'Vector search · DPU path · optimized routing';
                    if (bigipActive) return 'Vector search · S3-optimized retrieval';
                    if (bnkActive) return 'Vector search · DPU-accelerated path';
                    return 'Vector search · unoptimized path';
                }
                if (bigipActive && bnkActive) return 'Optimized retrieval + DPU acceleration';
                if (bigipActive) return 'S3-optimized context retrieval';
                if (bnkActive) return 'DPU-accelerated context delivery';

            const STAGE_BG = { INGEST: 'bg-[#e4002b]', RETRIEVE: 'bg-[#00b4d8]', GENERATE: 'bg-[#ff6a13]' };

            return (
                <div className={`pt-16 px-4 pb-3 h-full min-h-0 flex flex-col ${isDark ? 'text-white' : 'text-gray-900'}`}>

                        <span className="w-16 text-right">Status</span>
                    </div>
                    <div className={`h-px mb-2 ${isDark ? 'bg-white/10' : 'bg-gray-200'}`} />

                    <div className="flex flex-col gap-1.5 overflow-hidden" style={{ height: '280px' }}>
                        {rows.map((r, i) => {
                            const isNewest = i === 0;
                            const isBad = r.status.includes('⚠');
                            const row = (
                                <div className="py-1.5 px-2 rounded-lg" style={{ backgroundColor: isBad ? (isDark ? 'rgba(239,68,68,0.08)' : 'rgba(239,68,68,0.06)') : (isDark ? 'rgba(16,185,129,0.10)' : 'rgba(16,185,129,0.08)') }}>
                                    <div className="flex items-center text-sm">
                                        <span className="w-24 shrink-0">
                                            <span className={`${STAGE_BG[r.stage]} text-white text-xs font-bold px-1.5 py-0.5 rounded`}>{r.stage}</span>
                                        </span>
                                        <span className="flex-1 truncate font-medium">{r.name}</span>
                                        <span className={`w-20 text-right text-xs ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>{r.size}</span>
                                        <span className={`w-20 text-right text-xs font-mono ${anyActive ? 'text-emerald-400' : (isDark ? 'text-gray-400' : 'text-gray-500')}`}>{r.speed}</span>
                                        <span className={`w-16 text-right text-xs ${r.status.includes('✓') ? 'text-emerald-400' : 'text-amber-400'}`}>{r.status}</span>
                                    </div>
                                    <div className={`text-xs mt-0.5 pl-24 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>
                                        {r.detail}
                                    </div>
                                </div>
                            );
                            return isNewest
                                ? <motion.div key={r.id} initial={{ opacity: 0, y: -8 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.3 }}>{row}</motion.div>
                                : <div key={r.id} style={{ opacity: Math.max(0.3, 1 - i * 0.15) }}>{row}</div>;
                        })}
                    </div>

                    <div className={`mt-2 pt-2 border-t ${isDark ? 'border-white/10' : 'border-gray-200'}`}>
                        <div className="flex items-center gap-6 text-xs">
                            <div className="flex-1">
                                <div className="flex justify-between mb-1">
                                    <span className={isDark ? 'text-gray-400' : 'text-gray-500'}>Ingestion</span>
                                    <span className="font-mono font-semibold">{anyActive ? '3.2 GB/s' : '400 MB/s'}</span>
                                </div>
                                <div className={`h-1.5 rounded-full overflow-hidden ${isDark ? 'bg-white/10' : 'bg-gray-200'}`}>
                                    <div className="h-full rounded-full bg-[#e4002b]" style={{ width: anyActive ? '100%' : '12.5%', transition: 'width 0.8s ease-out' }} />
                                </div>
                            </div>
                            <div className="flex-1">
                                <div className="flex justify-between mb-1">
                                    <span className={isDark ? 'text-gray-400' : 'text-gray-500'}>Retrieval</span>
                                    <span className="font-mono font-semibold">{anyActive ? '8ms avg' : '45ms avg'}</span>
                                </div>
                                <div className={`h-1.5 rounded-full overflow-hidden ${isDark ? 'bg-white/10' : 'bg-gray-200'}`}>
                                    <div className="h-full rounded-full bg-[#00b4d8]" style={{ width: anyActive ? '100%' : '18%', transition: 'width 0.8s ease-out' }} />
                                </div>
                            </div>
                        </div>
                        <div className={`text-xs mt-1.5 text-center ${anyActive ? 'text-emerald-400' : (isDark ? 'text-gray-600' : 'text-gray-500')}`}>
                            {bigipActive && bnkActive ? 'BIG-IP S3 profiles + BNK DPU acceleration' :
                             bigipActive ? 'BIG-IP S3 profiles · enable BNK for DPU acceleration' :
                             bnkActive ? 'BNK DPU acceleration · enable BIG-IP for S3 profiles' :
                             'No optimization — default TCP path'}
                        </div>
                    </div>
                </div>
            );
        };

        // Simulation: MCP Server Protection
        const SimMCP = ({ active, toggles = {} }) => {
            const { isDark } = useTheme();
            const [log, setLog] = useState([]);
            const [totals, setTotals] = useState({ total: 0, allowed: 0, blocked: 0 });
            const idxRef = React.useRef(0);
            const totalsRef = React.useRef({ total: 0, allowed: 0, blocked: 0 });

            const bnkActive = toggles.bnk ?? active;

            const SEQUENCE = [
                { tool: 'query_database', args: 'SELECT orders WHERE date > "2024-01"', source: 'Agent-3', threat: 'none', inspection: 'Validated', detail: 'Authorized · Logged', offDetail: 'Direct access · No logging' },
                { tool: 'read_filesystem', args: '/etc/shadow', source: 'Agent-7', threat: 'unauthorized', inspection: 'Sensitive path', detail: 'Unauthorized tool access', offDetail: '⚠ Sensitive! No protection' },
                { tool: 'search_api', args: '"Q3 revenue data"', source: 'Agent-1', threat: 'none', inspection: 'Validated', detail: 'Authorized · Logged', offDetail: 'Direct access · No logging' },
                { tool: 'execute_code', args: 'rm -rf /tmp/*', source: 'Agent-4', threat: 'dangerous', inspection: 'Restricted tool', detail: 'Dangerous tool call blocked', offDetail: '⚠ Dangerous! Unblocked' },
                { tool: 'list_tools', args: 'MCP handshake', source: 'Agent-2', threat: 'none', inspection: 'Validated', detail: 'Session: mcp_a2f8…', offDetail: 'No session tracking' },
                { tool: 'get_user_data', args: 'user_id=4521 include=ssn,email', source: 'Agent-5', threat: 'pii', inspection: 'PII detected', detail: 'SSN field stripped · Logged', offDetail: '⚠ PII exposed! No scrubbing' },
                { tool: 'query_database', args: 'SELECT * FROM users LIMIT 10000', source: 'Agent-6', threat: 'rate', inspection: 'Excessive scope', detail: 'Rate limited · 1000 row cap', offDetail: 'Full table scan · No limits' },
                { tool: 'search_api', args: '"competitor pricing"', source: 'Agent-1', threat: 'none', inspection: 'Validated', detail: 'Authorized · Logged', offDetail: 'Direct access · No logging' },
                { tool: 'write_file', args: '/var/config/override.yaml', source: 'Agent-8', threat: 'dangerous', inspection: 'Write blocked', detail: 'Write tool not permitted', offDetail: '⚠ Config overwrite! Unblocked' },
                { tool: 'query_database', args: 'SELECT name, dept FROM employees', source: 'Agent-3', threat: 'none', inspection: 'Validated', detail: 'Authorized · Logged', offDetail: 'Direct access · No logging' },
            ];

            useEffect(() => {
                idxRef.current = 0;
                setLog([]);
                totalsRef.current = { total: 0, allowed: 0, blocked: 0 };
                setTotals({ total: 0, allowed: 0, blocked: 0 });

                const processRequest = () => {
                    const req = SEQUENCE[idxRef.current % SEQUENCE.length];
                    idxRef.current++;
                    let decision, isBlocked = false;
                    if (!bnkActive) {
                        decision = 'passed';
                    } else {
                        switch (req.threat) {
                            case 'unauthorized': case 'dangerous': decision = 'blocked'; isBlocked = true; break;
                            case 'pii': decision = 'scrubbed'; break;
                            case 'rate': decision = 'limited'; break;
                            default: decision = 'allowed';
                        }
                    }
                    setLog(prev => [...prev.slice(-6), {
                        id: Date.now(),
                        tool: req.tool,
                        args: req.args,
                        source: bnkActive ? req.source : '(unknown)',
                        inspection: bnkActive ? (req.threat !== 'none' ? '⚠ ' + req.inspection : '✓ ' + req.inspection) : '— No inspection',
                        detail: bnkActive ? req.detail : req.offDetail,
                        decision,
                        blocked: isBlocked,
                        threat: req.threat,
                    }]);
                    const t = totalsRef.current;
                    t.total++;
                    if (decision === 'allowed') t.allowed++;
                    if (isBlocked) t.blocked++;
                    totalsRef.current = { ...t };
                    setTotals({ ...t });
                };

                const interval = setInterval(processRequest, 2000);
                return () => clearInterval(interval);
            }, [bnkActive]);

            return (
                <div className={`pt-16 px-4 pb-3 h-full min-h-0 flex flex-col ${isDark ? 'text-white' : 'text-gray-900'}`}>
                    <div className={`flex items-center text-xs font-semibold uppercase tracking-wider mb-2 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>

                                }}>
                                    <div className="flex items-center gap-2">
                                        <span className={`text-sm font-mono font-medium shrink-0 ${r.blocked ? 'text-red-400 line-through' : (isDark ? 'text-gray-200' : 'text-gray-800')}`} style={{ minWidth: '120px' }}>{r.tool}</span>
                                        <span className={`text-xs px-1.5 py-0.5 rounded shrink-0 ${r.source === '(unknown)' ? (isDark ? 'bg-white/5 text-gray-500' : 'bg-gray-100 text-gray-500') : (isDark ? 'bg-white/5 text-gray-300' : 'bg-gray-100 text-gray-600')}`}>{r.source}</span>
                                        <span className={`flex-1 text-xs truncate ${r.inspection.startsWith('⚠') ? 'text-orange-400' : r.inspection.startsWith('✓') ? (isDark ? 'text-gray-400' : 'text-gray-500') : (isDark ? 'text-gray-500' : 'text-gray-500')}`}>{r.inspection}</span>
                                        <span className={`text-xs font-semibold w-20 text-right shrink-0 ${r.decision === 'allowed' ? 'text-emerald-400' : r.decision === 'blocked' ? 'text-red-500' : (r.decision === 'scrubbed' || r.decision === 'limited') ? 'text-orange-400' : (isDark ? 'text-gray-500' : 'text-gray-500')}`}>
                                            {r.decision === 'allowed' ? '✓ Allowed' : r.decision === 'blocked' ? '✕ Blocked' : r.decision === 'scrubbed' ? '⚠ Scrubbed' : r.decision === 'limited' ? '⚠ Limited' : '— Passed'}
                                        </span>
                                    </div>
                                    <div className="flex items-center gap-2 mt-0.5">
                                        <span className={`text-xs font-mono truncate ${isDark ? 'text-gray-500' : 'text-gray-500'}`} style={{ minWidth: '120px' }}>
                                            {r.args.length > 28 ? r.args.slice(0, 28) + '…' : r.args}
                                        </span>
                                        <span className={`text-xs ${r.detail.startsWith('⚠') ? 'text-orange-400' : (isDark ? 'text-gray-500' : 'text-gray-500')}`}>{r.detail}</span>
                                    </div>
                                </div>
                            );
                            return isNewest
                                ? <motion.div key={r.id} initial={{ opacity: 0, y: -6 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.4 }}>{row}</motion.div>
                                : <div key={r.id} style={{ opacity: Math.max(0.35, 1 - (log.length - 1 - i) * 0.12) }}>{row}</div>;
                        })}
                    </div>

                    {/* Log rows */}
                    <div className="flex-1 flex flex-col gap-0.5 overflow-auto" style={{ minHeight: '220px' }}>

        // Simulation: NGINX EPP Inference Router
        const SimEPPRouter = ({ active, toggles = {} }) => {
            const { isDark } = useTheme();
            const nginxActive = toggles.nginx || false;
            const [log, setLog] = useState([]);
            const [pipelineStep, setPipelineStep] = useState(-1);
            const [lastDecision, setLastDecision] = useState(null);
            const idxRef = useRef(0);

            const pods = [
                { id: 'vllm-0', gpu: 'A100', gpuUtil: 72, queue: 3, kv: 45, ttft: 245, lora: ['llama-3-8b'] },
                { id: 'vllm-1', gpu: 'A100', gpuUtil: 89, queue: 9, kv: 11, ttft: 375, lora: ['mistral-7b'] },
                { id: 'vllm-2', gpu: 'H100', gpuUtil: 41, queue: 1, kv: 67, ttft: 162, lora: ['llama-3-8b', 'llama-3-70b'] },
                { id: 'vllm-3', gpu: 'A100', gpuUtil: 96, queue: 13, kv: 7, ttft: 495, lora: [] },
                { id: 'vllm-4', gpu: 'H100', gpuUtil: 55, queue: 2, kv: 53, ttft: 192, lora: ['llama-3-8b', 'llama-3-70b', 'mistral-7b'] },
                { id: 'vllm-5', gpu: 'A100', gpuUtil: 62, queue: 5, kv: 30, ttft: 288, lora: ['llama-3-8b'] },
            ];

            const calcFactors = (pod, modelId) => {
                const qPts = -(pod.queue * 4.2);
                const kvPts = pod.kv * 0.38;
                const gpuPts = -Math.max(0, pod.gpuUtil - 60) * 0.45;
                const ttftPts = -(pod.ttft / 14);
                const loraPts = pod.lora.includes(modelId) ? 20 : 0;
                const h100Pts = modelId === 'llama-3-70b' && pod.gpu === 'H100' ? 12 : 0;
                const total = Math.max(0, Math.round(100 + qPts + kvPts + gpuPts + ttftPts + loraPts + h100Pts));
                return { qPts, kvPts, gpuPts, ttftPts, loraPts, h100Pts, total };
            };

            // Set initial decision on mount so the rationale panel is always visible
            useEffect(() => {
                if (!lastDecision) {
                    setLastDecision({ pod: 'vllm-2', gpu: 'H100', model: 'llama-3-8b', text: 'Explain K8s CNI plugins', factors: calcFactors(pods[2], 'llama-3-8b'), isEPP: true });
                }

                    { regex: /do\s+anything\s+now|without\s+restrictions|bypass\s+(safety|filters|rules)/i, scanner: 'Jailbreak', conf: 94, threat: 'jailbreak', label: 'Jailbreak attempt · Safety bypass request', decision: 'blocked', tier: 'guardrails' },
